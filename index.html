<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingdom of Trash</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5c842;
            --gold-dark: #c9940a;
            --gem: #3de8a0;
            --gem-dark: #1ab875;
            --bg-dark: #0d1117;
            --bg-panel: #1a2030;
            --bg-card: #1e2840;
            --border: #2d3a55;
            --border-bright: #3d5080;
            --text: #e8dfc8;
            --text-dim: #8899aa;
            --red: #e84040;
            --blue: #4080e8;
            --purple: #9b59b6;
            --orange: #e87820;
            --green: #2ecc71
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Crimson Pro',serif;
            color: var(--text);
            touch-action: manipulation
        }

        /* TOPBAR */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg,#0a0e16,#0d1117cc);
            border-bottom: 1px solid var(--border);
            padding: 6px 10px;
            backdrop-filter: blur(8px);
            gap: 6px
        }

        .res-group {
            display: flex;
            gap: 6px;
            flex: 1
        }

        .res-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 8px 4px 6px;
            font-family: 'Cinzel',serif;
            font-size: 12px;
            font-weight: 700;
            transition: transform .15s
        }

            .res-chip.bump {
                transform: scale(1.18)
            }

            .res-chip .val {
                color: var(--gold)
            }

        /* Storage cap states */
        .res-chip.res-full {
            border-color: var(--red);
            background: #2a1015;
        }
        .res-chip.res-overflow {
            border-color: var(--gold);
            animation: overflowPulse 1.2s ease-in-out infinite;
        }
        @keyframes overflowPulse {
            0%,100% { box-shadow: 0 0 0px #f5c84200; }
            50%      { box-shadow: 0 0 10px #f5c84299; }
        }
        @keyframes lostFloat {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            60%  { opacity: 0.8; transform: translateY(-28px) scale(0.9); }
            100% { opacity: 0; transform: translateY(-48px) scale(0.6); }
        }

        .gem-chip .val {
            color: var(--gem) !important
        }

        .castle-badge {
            font-family: 'Cinzel',serif;
            font-size: 12px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: .5px;
            text-shadow: 0 0 12px #f5c84255;
            cursor: pointer;
            white-space: nowrap
        }

        
/* WORLD */
#world{position:fixed;top:54px;bottom:114px;left:0;right:0;overflow-y:auto;background:radial-gradient(ellipse at 50% 80%,#1a3020 0%,transparent 60%),radial-gradient(ellipse at 20% 20%,#1a2530 0%,transparent 50%),linear-gradient(180deg,#0d1520,#0d1a10)}
#world::before{content:'';position:fixed;top:54px;bottom:114px;left:0;right:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 32px,#ffffff04 32px,#ffffff04 33px),repeating-linear-gradient(90deg,transparent,transparent 32px,#ffffff04 32px,#ffffff04 33px);pointer-events:none;z-index:0}
/* Fix: world-inner is relative for scroll layout; trees use a separate fixed overlay rendered in JS */
#world-inner{position:relative;min-height:100%;display:grid;gap:5px;padding:8px;padding-bottom:24px;z-index:1}






        /* BUILDING SLOTS */
        .bs {
            background: linear-gradient(145deg,#1a2535,#111822);
            border: 1px solid var(--border);
            border-radius: 9px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform .12s,box-shadow .12s,border-color .12s;
            position: relative;
            overflow: hidden;
            aspect-ratio: 1
        }

            .bs:active {
                transform: scale(0.91)
            }

            .bs.has {
                background: linear-gradient(145deg,#1e2d45,#151e30);
                border-color: var(--border-bright)
            }

                .bs.has:hover {
                    border-color: var(--gold);
                    box-shadow: 0 0 12px #f5c84233
                }

            .bs.cas {
                border-color: #a07020;
                background: linear-gradient(145deg,#2a2010,#1a1408)
            }

                .bs.cas:hover {
                    border-color: var(--gold);
                    box-shadow: 0 0 18px #f5c84244
                }

            .bs.con {
                border-color: var(--orange);
                animation: cpulse 1.5s ease-in-out infinite
            }

        @keyframes cpulse {
            0%,100% {
                box-shadow: 0 0 6px #e8782044
            }

            50% {
                box-shadow: 0 0 16px #e87820aa
            }
        }

        .bs.empty {
            border-style: dashed;
            border-color: #2a3550;
            background: transparent;
            opacity: .55
        }

            .bs.empty:hover {
                opacity: 1;
                border-color: var(--gold)
            }

        .bs.lk {
            border-style: dashed;
            border-color: #1e2535;
            background: transparent;
            opacity: .25;
            cursor: not-allowed
        }

        .be {
            font-size: 24px;
            line-height: 1
        }

        .bn {
            font-family: 'Cinzel',serif;
            font-size: 8px;
            color: var(--text-dim);
            margin-top: 2px;
            text-align: center
        }

        .bl {
            position: absolute;
            top: 3px;
            right: 5px;
            font-family: 'Cinzel',serif;
            font-size: 10px;
            color: var(--gold);
            font-weight: 700
        }

        .pb {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #ffffff11
        }

        .pf {
            height: 100%;
            background: var(--orange);
            border-radius: 2px;
            transition: width 1s linear
        }

        .tl {
            position: absolute;
            bottom: 4px;
            font-size: 8px;
            color: var(--orange);
            font-family: 'Cinzel',serif
        }

        .pi {
            font-size: 18px;
            color: #2a3550
        }

        .empty:hover .pi {
            color: var(--gold)
        }

        /* BOTTOM NAV */
        #bnav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            background: linear-gradient(0deg,#080c12,#0d1117);
            border-top: 1px solid var(--border);
            height: 114px
        }

        .nb {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            padding: 8px 2px;
            border: none;
            background: none;
            color: var(--text-dim);
            font-family: 'Cinzel',serif;
            font-size: 9px;
            letter-spacing: .3px;
            transition: background .15s
        }

            .nb:active {
                background: #ffffff08
            }

            .nb.active {
                color: var(--gold)
            }

        .ni {
            font-size: 22px
        }

        .nb.active .ni {
            filter: drop-shadow(0 0 5px #f5c84280)
        }

        /* MODALS */
        .mo {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #00000088;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: flex-end;
            animation: fi .18s ease
        }

        @keyframes fi {
            from {
                opacity: 0
            }
        }

        .mo.ctr {
            align-items: center;
            justify-content: center
        }

        .ms {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-panel);
            border: 1px solid var(--border-bright);
            border-radius: 16px 16px 0 0;
            padding: 14px 13px 26px;
            animation: su .22s cubic-bezier(.34,1.56,.64,1)
        }

        @keyframes su {
            from {
                transform: translateY(100%)
            }
        }

        .ms.cs {
            border-radius: 14px;
            margin: 14px;
            width: auto;
            animation: pi2 .22s cubic-bezier(.34,1.56,.64,1)
        }

        @keyframes pi2 {
            from {
                transform: scale(.85);
                opacity: 0
            }
        }

        .mh {
            width: 34px;
            height: 4px;
            background: var(--border-bright);
            border-radius: 2px;
            margin: 0 auto 12px
        }

        .mt {
            font-family: 'Cinzel',serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 2px;
            text-shadow: 0 0 16px #f5c84244
        }

        .msub {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 10px
        }

        .msc {
            max-height: 52vh;
            overflow-y: auto;
            padding-right: 2px
        }

            .msc::-webkit-scrollbar {
                width: 3px
            }

            .msc::-webkit-scrollbar-thumb {
                background: var(--border-bright);
                border-radius: 2px
            }

        /* BUILD GRID */
        .bgrid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 7px;
            margin-top: 8px
        }

        .bop {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 9px 5px;
            text-align: center;
            cursor: pointer;
            transition: all .15s
        }

            .bop:hover {
                border-color: var(--gold);
                background: #1e2d45
            }

            .bop:active {
                transform: scale(.93)
            }

        .boi {
            font-size: 24px
        }

        .bon {
            font-family: 'Cinzel',serif;
            font-size: 9px;
            color: var(--text);
            margin-top: 2px
        }

        .boc {
            font-size: 10px;
            color: var(--gold);
            margin-top: 1px
        }

        .bot {
            font-size: 9px;
            color: var(--text-dim)
        }

        .boreq {
            font-size: 9px;
            color: var(--red)
        }

        .bop.ca {
            opacity: .42;
            cursor: not-allowed
        }

        .bop.nc {
            opacity: .32;
            cursor: not-allowed
        }

        /* STAT ROWS */
        .sr {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px
        }

            .sr:last-child {
                border-bottom: none
            }

        .sl {
            color: var(--text-dim)
        }

        .sv {
            color: var(--text);
            font-weight: 600
        }

        /* BUTTONS */
        .br {
            display: flex;
            gap: 7px;
            margin-top: 10px
        }

        .gb {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-family: 'Cinzel',serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            letter-spacing: .3px
        }

            .gb:active {
                transform: scale(.95)
            }

        .gld {
            background: linear-gradient(135deg,var(--gold-dark),var(--gold));
            color: #1a1000
        }

        .gem {
            background: linear-gradient(135deg,var(--gem-dark),var(--gem));
            color: #001a0e
        }

        .pur {
            background: linear-gradient(135deg,#6c3483,var(--purple));
            color: #fff
        }

        .blu {
            background: linear-gradient(135deg,#1a3a6a,var(--blue));
            color: #fff
        }

        .grn {
            background: linear-gradient(135deg,#1a6a2a,var(--green));
            color: #fff
        }

        .drk {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-dim)
        }

        /* SHOP ITEMS */
        .si {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 10px;
            cursor: pointer;
            transition: border-color .15s;
            margin-bottom: 7px
        }

            .si:hover {
                border-color: var(--gem)
            }

            .si:active {
                transform: scale(.98)
            }

        .sii {
            font-size: 30px
        }

        .sin {
            font-family: 'Cinzel',serif;
            font-size: 12px;
            font-weight: 700;
            flex: 1
        }

        .sid {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 1px
        }

        .sip {
            font-family: 'Cinzel',serif;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg,var(--gem-dark),var(--gem));
            padding: 5px 9px;
            border-radius: 14px;
            white-space: nowrap
        }

        /* HEROES */
        .hgrid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 8px;
            margin-top: 8px
        }

        .hc {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 11px;
            text-align: center;
            cursor: pointer;
            transition: all .15s;
            position: relative
        }

            .hc:hover {
                border-color: var(--purple);
                box-shadow: 0 0 10px #9b59b633
            }

        .hci {
            font-size: 38px;
            display: block;
            margin-bottom: 3px
        }

        .hcn {
            font-family: 'Cinzel',serif;
            font-size: 10px;
            font-weight: 700
        }

        .hcl {
            font-size: 9px;
            color: var(--purple);
            margin-top: 2px
        }

        .hcb {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--purple);
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 7px
        }

        .hc.lkd {
            opacity: .38
        }

        .xpb {
            height: 3px;
            background: #ffffff13;
            border-radius: 2px;
            margin-top: 5px
        }

        .xpf {
            height: 100%;
            background: var(--purple);
            border-radius: 2px;
            transition: width .5s
        }

        /* TROOPS */
        .tgrid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 7px;
            margin-top: 8px
        }

        .tc {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 9px;
            text-align: center;
            cursor: default;
            position: relative
        }

        .tce {
            font-size: 32px;
            display: block
        }

        .tcn {
            font-family: 'Cinzel',serif;
            font-size: 10px;
            margin-top: 3px
        }

        .tcs {
            font-size: 9px;
            color: var(--text-dim);
            margin-top: 1px
        }

        .tcc {
            font-size: 10px;
            color: var(--gold);
            margin-top: 2px
        }

        .tcb {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--blue);
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 7px
        }

        .ttr {
            margin-top: 6px;
            width: 100%;
            padding: 5px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(135deg,#1a3a6a,var(--blue));
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer
        }

            .ttr:active {
                transform: scale(.95)
            }

        .tpb {
            height: 3px;
            background: #ffffff11;
            border-radius: 2px;
            margin-top: 5px
        }

        .tpf {
            height: 100%;
            background: var(--blue);
            border-radius: 2px
        }

        /* CLAN */
        .clan-hdr {
            background: linear-gradient(135deg,#1a1535,#2a1050);
            border: 1px solid var(--purple);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            margin-bottom: 10px
        }

        .cnb {
            font-family: 'Cinzel',serif;
            font-size: 18px;
            font-weight: 900;
            color: var(--purple);
            text-shadow: 0 0 18px #9b59b655
        }

        .cm {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 7px;
            margin-bottom: 5px
        }

        .cme {
            font-size: 24px
        }

        .cmn {
            font-family: 'Cinzel',serif;
            font-size: 11px
        }

        .cmr {
            font-size: 9px;
            color: var(--text-dim)
        }

        .cmt {
            font-size: 11px;
            color: var(--gold)
        }

        .cdb {
            padding: 4px 9px;
            border-radius: 6px;
            border: none;
            background: var(--green);
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 9px;
            cursor: pointer
        }

        /* BATTLE SCREEN */
        #bscr {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: none;
            flex-direction: column;
            background: #0a0810;
            overflow: hidden
        }

            #bscr.act {
                display: flex
            }

        .btb {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 12px;
            background: #0d0a14;
            border-bottom: 1px solid var(--purple)
        }

        .bfield {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at 50% 100%,#0d2010,#080810 60%);
            overflow: hidden
        }

            .bfield::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image: repeating-linear-gradient(0deg,transparent,transparent 40px,#ffffff03 40px,#ffffff03 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,#ffffff03 40px,#ffffff03 41px);
                pointer-events: none
            }

        .eb {
            position: absolute;
            font-size: 30px;
            cursor: pointer;
            filter: hue-rotate(25deg);
            transform: translate(-50%,-50%)
        }

            .eb.shk {
                animation: shk .3s ease
            }

            .eb.dst {
                opacity: 0;
                transform: translate(-50%,-50%) scale(0) !important;
                transition: all .5s
            }

        @keyframes shk {
            0%,100% {
                transform: translate(-50%,-50%)
            }

            25% {
                transform: translate(calc(-50% - 6px),-50%)
            }

            75% {
                transform: translate(calc(-50% + 6px),-50%)
            }
        }

        .ehp {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 3px;
            background: #ff000022;
            border-radius: 2px
        }

        .ehf {
            height: 100%;
            background: var(--green);
            border-radius: 2px;
            transition: width .3s
        }

        .bbot {
            background: #0d0a14;
            border-top: 1px solid var(--purple);
            padding: 9px 10px;
            display: flex;
            flex-direction: column;
            gap: 7px
        }

        .drow {
            display: flex;
            gap: 7px;
            align-items: center
        }

        .dbtn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 7px 9px;
            cursor: pointer;
            transition: all .15s;
            position: relative
        }

            .dbtn:hover {
                border-color: var(--blue)
            }

            .dbtn.sel {
                border-color: var(--blue);
                background: #1a2840;
                box-shadow: 0 0 10px #4080e855
            }

            .dbtn:active {
                transform: scale(.91)
            }

        .de {
            font-size: 20px
        }

        .dc {
            font-size: 10px;
            color: var(--blue);
            font-family: 'Cinzel',serif
        }

        .dl {
            font-size: 8px;
            color: var(--text-dim)
        }

        .bhpb {
            height: 7px;
            background: #ff000022;
            border-radius: 4px;
            overflow: hidden
        }

        .bhpf {
            height: 100%;
            background: linear-gradient(90deg,var(--red),var(--orange));
            border-radius: 4px;
            transition: width .5s
        }

        .bstars {
            display: flex;
            gap: 4px;
            justify-content: center
        }

        .bst {
            font-size: 18px;
            filter: grayscale(1);
            transition: filter .5s,transform .3s
        }

            .bst.on {
                filter: none;
                transform: scale(1.2)
            }

        .dmgf {
            position: absolute;
            font-family: 'Cinzel',serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--red);
            pointer-events: none;
            z-index: 10;
            animation: du .8s ease-out forwards
        }

        @keyframes du {
            0% {
                opacity: 1;
                transform: translateY(0)
            }

            100% {
                opacity: 0;
                transform: translateY(-38px)
            }
        }

        /* SPEEDUP */
        .spo {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            background: var(--bg-card);
            transition: border-color .15s
        }

            .spo:hover {
                border-color: var(--gem)
            }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 126px;
            left: 50%;
            transform: translateX(-50%) translateY(18px);
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            border-radius: 16px;

function saveGame() {
   localStorage.setItem('kingdomOfTrashSave', JSON.stringify(G));
        }

        function loadGame() {
  const savedData = localStorage.getItem('kingdomOfTrashSave');
  if (savedData) {
    try {
      const parsed = JSON.parse(savedData);
      G = Object.assign(G, parsed);
      
      G.achieved = G.achieved || [];
      G.achClaimed = G.achClaimed || [];
      G.overflowExpiry = G.overflowExpiry || null;
      G.overflowBonus = G.overflowBonus || 0;
      G.smugglerLoot = G.smugglerLoot || 0;
      G.garrison = G.garrison || {};
      
      // Merge saved decaySquad shards/unlocked into default roster (preserves new heroes added later)
      if (parsed.decaySquad) {
        G.decaySquad.forEach(h => {
          const saved = parsed.decaySquad.find(s => s.id === h.id);
          if (saved) { h.shards = saved.shards || 0; h.unlocked = saved.unlocked || false; h.level = saved.level || 0; }
        });
      }

      // Migrate old hero roster → Kai Man. If save has old heroes, replace with Kai Man only.
      const hasOldHeroes = parsed.heroes && parsed.heroes.some(h => ['knight','archer','mage','dragon'].includes(h.id));
      if (hasOldHeroes) {
        G.heroes = [{id:'kaiman',name:'Kai Man',emoji:'🗑️',level:1,xp:0,xpNeeded:100,power:110,unlocked:true,ability:'Grown Man Screams',garrisonBuff:'goldProd',garrisonDesc:'+10% Gold Mine production',garrisonMult:0.10}];
        // Clear any garrison slots that referenced old hero IDs
        Object.keys(G.garrison).forEach(slot => {
          if (['knight','archer','mage','dragon'].includes(G.garrison[slot])) delete G.garrison[slot];
        });
      } else if (parsed.heroes && parsed.heroes[0]?.id === 'kaiman') {
        // Carry forward Kai Man progress
        G.heroes[0].xp = parsed.heroes[0].xp || 0;
        G.heroes[0].level = parsed.heroes[0].level || 1;
        G.heroes[0].xpNeeded = parsed.heroes[0].xpNeeded || 100;
      }
      
      // FIX: Automatically expand old 16-slot saves into the new 60-slot empire
      if (G.buildings.length < 60) {
        const currentLength = G.buildings.length;
        const newSlots = Array.from({ length: 60 - currentLength }, (_, i) => ({ 
            slot: currentLength + i, type: null, constructionEnd: null, constructionDuration: null 
        }));
        G.buildings = G.buildings.concat(newSlots);
      }
      
      G.lastTick = Date.now();
    } catch (e) {
      console.error("Failed to load save", e);
    }
  }
}

// ═══════════════ STORAGE CAPACITY ═══════════════
const BASE_GOLD_CAP = 500;
const BASE_FOOD_CAP = 200;

function calcMaxGold() {
  let cap = BASE_GOLD_CAP;
  G.buildings.forEach(b => {
    if (b.type === 'vault' && !b.constructionEnd && b.level > 0) {
      cap += Math.round(1000 * Math.pow(1.5, b.level - 1));
    }
  });
  // Apply overflow bonus multiplier (0.2 = +20%, 0.5 = +50%, 2.0 = +200%)
  if (G.overflowExpiry && Date.now() < G.overflowExpiry && G.overflowBonus > 0) {
    cap = Math.round(cap * (1 + G.overflowBonus));
  }
  return cap;
}

function calcMaxFood() {
  let cap = BASE_FOOD_CAP;
  G.buildings.forEach(b => {
    if (b.type === 'silo' && !b.constructionEnd && b.level > 0) {
      cap += Math.round(500 * Math.pow(1.5, b.level - 1));
    }
  });
  // King Compost garrison buff: +50% food storage
  if (garrisonHasBuff('foodCap')) cap = Math.round(cap * 1.50);
  if (G.overflowExpiry && Date.now() < G.overflowExpiry && G.overflowBonus > 0) {
    cap = Math.round(cap * (1 + G.overflowBonus));
  }
  return cap;
}

// ═══════════════ GARRISON SYSTEM ═══════════════
function garrisonHasBuff(buffId) {
  const allHeroes = [...G.heroes, ...G.decaySquad];
  return Object.values(G.garrison).some(heroId => {
    const h = allHeroes.find(x => x.id === heroId);
    return h && h.unlocked && h.garrisonBuff === buffId;
  });
}

function garrisonBuffMult(buffId) {
  const allHeroes = [...G.heroes, ...G.decaySquad];
  let mult = 0;
  Object.values(G.garrison).forEach(heroId => {
    const h = allHeroes.find(x => x.id === heroId);
    if (h && h.unlocked && h.garrisonBuff === buffId) mult += h.garrisonMult;
  });
  return mult;
}

// Get which slot this hero is garrisoned in (-1 if none)
function heroGarrisonSlot(heroId) {
  return Object.entries(G.garrison).find(([,v])=>v===heroId)?.[0] ?? null;
}

// Apply garrison: assign hero to slot (remove from old slot first)
function assignGarrison(slotIdx, heroId) {
  // Remove hero from any existing slot
  const prev = heroGarrisonSlot(heroId);
  if (prev !== null) delete G.garrison[prev];
  // Remove any hero previously in this slot
  if (slotIdx !== null) G.garrison[slotIdx] = heroId;
  saveGame(); renderBuildings(); updateUI();
}

function removeGarrison(slotIdx) {
  delete G.garrison[slotIdx];
  saveGame(); renderBuildings(); updateUI();
}

// Garrison UI: called from building info modal

  const eligibleHeroes = G.heroes.filter(h => h.unlocked);
  const eligible = [...eligibleHeroes, ...eligibleDecay];
  const currentHeroId = G.garrison[slotIdx] || null;

  if (eligible.length === 0) {
    showToast('Assemble a hero from the Altar first!');
    return;

      <span class="garrison-pick-emoji">${h.emoji}</span>

      <div class="garrison-pick-status">${isActive?'✅ HERE':isElsewhere?'⚔ Deployed':'Available'}</div>

// Vault upgrade cost = 115% of CURRENT max gold cap (always just out of reach naturally)
function vaultUpgradeCost(currentLevel) {
  // What the cap will be at currentLevel (before upgrading)
  const currentCap = BASE_GOLD_CAP + Math.round(1000 * Math.pow(1.5, currentLevel - 1));
  return Math.round(currentCap * 1.15);
}

// Silo upgrade cost = 115% of current max food cap
function siloUpgradeCost(currentLevel) {
  const currentCap = BASE_FOOD_CAP + Math.round(500 * Math.pow(1.5, currentLevel - 1));
  return Math.round(currentCap * 1.15);
}

// ═══════════════ TICK ═══════════════
function tick(){
  const now=Date.now(), dt=(now-G.lastTick)/1000;
  G.lastTick=now;

  const maxGold = calcMaxGold();
  const maxFood = calcMaxFood();
  const wasGoldFull = G.gold >= maxGold;
  const wasFoodFull = G.food >= maxFood;

  G.buildings.forEach(b=>{
    if(!b.type||b.constructionEnd)return;
    const d=BD[b.type];if(!d)return;
    // Apply garrison production multipliers — check both heroes[] and decaySquad[]
    const garrisonedHeroId = G.garrison[b.slot];
    let gh = null;
    if (garrisonedHeroId) {
      gh = G.decaySquad.find(h => h.id === garrisonedHeroId && h.unlocked)
        || G.heroes.find(h => h.id === garrisonedHeroId && h.unlocked);
    }
    let pgMult = 1, pfMult = 1;
    if (gh && gh.unlocked) {
      if (gh.garrisonBuff === 'goldProd' && d.pg > 0) pgMult = 1 + gh.garrisonMult;
      if (gh.garrisonBuff === 'farmProd' && d.pf > 0) pfMult = 1 + gh.garrisonMult;
    }
    if (d.pg > 0 && G.gold < maxGold) G.gold += d.pg * b.level * pgMult * dt;
    if (d.pf > 0 && G.food < maxFood) G.food += d.pf * b.level * pfMult * dt;
    // Shatter animation: show lost resource when at cap and producing
    if (d.pg > 0 && wasGoldFull) spawnLost('🪙', b);
    if (d.pf > 0 && wasFoodFull) spawnLost('🌾', b);
  });

  // Notify once on hitting cap
  if (G.gold >= maxGold && !wasGoldFull) showToast('🏦 Vault full! Mines are wasting gold — upgrade or spend!');
  if (G.food >= maxFood && !wasFoodFull) showToast('🗄️ Silo full! Farms are wasting food — upgrade or train troops!');

  // Hard clamp — no passive overflow allowed, only shop bonuses can exceed cap
  G.gold = Math.min(G.gold, maxGold);
  G.food = Math.min(G.food, maxFood);

  // Expire overflow bonus
  if (G.overflowExpiry && now >= G.overflowExpiry) {
    G.overflowExpiry = null;
    G.overflowBonus = 0;
    G.gold = Math.min(G.gold, calcMaxGold());
    G.food = Math.min(G.food, calcMaxFood());
    showToast('Overflow bonus expired — back to normal storage capacity.');
  }

  // Castle upgrade done?
  if(G.castleUpgrading&&now>=G.castleUpgrading){
    G.castleUpgrading=null; G.castleLevel++;
    const cb=G.buildings.find(b=>b.type==='castle');
    if(cb){cb.level=G.castleLevel;cb.constructionEnd=null;}
    showToast(`Your trash empire grows! Castle → Level ${G.castleLevel}! 🗑️✨`);spawnP('🏰',5);
  }
  // Troop training
  Object.entries(G.troops).forEach(([id,t])=>{
    const done=t.training.filter(tr=>now>=tr.finishAt);
    if(done.length){t.count+=done.length;t.training=t.training.filter(tr=>now<tr.finishAt);showToast(`${TD[id].e} ${TD[id].n} ×${done.length} ready!`);}
  });
  checkAch();
  updateUI();renderBuildings();
  saveGame();
  setTimeout(tick,1000);
}

// ═══════════════ UI ═══════════════
function updateUI() {
  const maxGold = calcMaxGold();
  const maxFood = calcMaxFood();
  const goldFull = G.gold >= maxGold;
  const foodFull = G.food >= maxFood;
  const goldOver = G.gold > maxGold;  // overflow (bonus gold above cap)
  const foodOver = G.food > maxFood;

  // Resource display: show current / max
  document.getElementById('gval').textContent = `${fmt(G.gold)} / ${fmt(maxGold)}`;
  document.getElementById('fval').textContent = `${fmt(G.food)} / ${fmt(maxFood)}`;
  document.getElementById('mval').textContent = fmt(G.gems);

  // Gold chip: red when full, pulsing gold when overflowing above cap
  const gchip = document.getElementById('gchip');
  const gval  = document.getElementById('gval');
  gchip.classList.toggle('res-full', goldFull && !goldOver);
  gchip.classList.toggle('res-overflow', goldOver);
  gval.style.color = goldOver ? 'var(--gold)' : goldFull ? 'var(--red)' : '';

  // Food chip: same logic
  const fchip = document.getElementById('fchip');
  const fval  = document.getElementById('fval');
  fchip.classList.toggle('res-full', foodFull && !foodOver);
  fchip.classList.toggle('res-overflow', foodOver);
  fval.style.color = foodOver ? 'var(--gold)' : foodFull ? 'var(--red)' : '';

  // Castle badge
  document.getElementById('cbadge').textContent = `🏰 Lv${G.castleLevel} · ${cc(G.castleLevel).label}`;
}

function fmt(n) {
  if (n < 1000) return Math.floor(n).toString();
  if (n < 1000000) return (n / 1000).toFixed(1).replace('.0', '') + 'k';
  if (n < 1000000000) return (n / 1000000).toFixed(2).replace('.00', '') + 'M';
  return (n / 1000000000).toFixed(2).replace('.00', '') + 'B';
}
function fmtT(ms) {
  if (ms <= 0) return 'Done!';
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60), d = Math.floor(h / 24);
  if (d > 0) return `${d}d ${h % 24}h`;
  if (h > 0) return `${h}h ${m % 60}m`;
  if (m > 0) return `${m}m ${s % 60}s`;
  return `${s}s`;
}
function bump(id){const e=document.getElementById(id);e.classList.add('bump');setTimeout(()=>e.classList.remove('bump'),280);}

// ═══════════════ WORLD ═══════════════
function renderBuildings(){
  const wi=document.getElementById('world-inner');
  const unlocked=cc(G.castleLevel).slots;
  const cols=G.castleLevel>=3?4:3;
  wi.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  wi.style.gridTemplateRows=`repeat(${Math.ceil(G.buildings.length/cols)},1fr)`;
  wi.innerHTML='';
  G.buildings.forEach((b,i)=>{
    const s=document.createElement('div'); s.className='bs';
    if(i>=unlocked){
      s.classList.add('lk');
      s.innerHTML=`<span style="font-size:14px">🔒</span><div class="bn" style="font-size:7px">Lv${i<9?2:i<12?3:4}+</div>`;
    } else if(!b.type){
      s.classList.add('empty');
      s.innerHTML=`<span class="pi">＋</span>`;
      s.onclick=()=>openBuildMenu(i);
    } else {
      const d=BD[b.type], isCas=b.type==='castle';
      if(isCas) s.classList.add('cas'); else s.classList.add('has');
      // is it being built/upgraded?
      const conEnd=isCas?G.castleUpgrading:b.constructionEnd;
      const conDur=isCas?(b.constructionDuration||60000):b.constructionDuration;
      if(conEnd){
        s.classList.add('con');
        const rem=Math.max(0,conEnd-Date.now());
        const pct=conDur?Math.round((1-rem/conDur)*100):0;
        s.innerHTML=`<span class="be">${d.e}</span><div class="bn">${d.n}</div><div class="tl">${fmtT(rem)}</div><div class="pb"><div class="pf" style="width:${pct}%"></div></div>`;
        s.onclick=()=>isCas?openCastleSpeedup():openSpeedup(i);
        if(rem<=0&&!isCas){b.constructionEnd=null;b.level=(b.level||0)+1;showToast(`${d.n} complete! 🎉`);}
      } else {
        const sz=isCas?'32px':b.level>=3?'28px':'24px';
        const garrisonHeroId = G.garrison[i];
        const garrisonHero = garrisonHeroId ? G.decaySquad.find(h=>h.id===garrisonHeroId) : null;
        const garrisonBadge = garrisonHero ? `<span class="garrison-badge" title="${garrisonHero.name}">${garrisonHero.emoji}</span>` : '';
        s.innerHTML=`<span class="be" style="font-size:${sz}">${d.e}</span><div class="bn">${d.n}</div><div class="bl">Lv${b.level}</div>${garrisonBadge}`;
        s.onclick=()=>isCas?openCastle():openBInfo(i);
      }
    }
    wi.appendChild(s);
  });
}

function upgCastle(){
  const cfg=cc(G.castleLevel);
  G.gold-=cfg.upgCost;

  G.castleUpgrading=Date.now()+dur;
  const cb=G.buildings.find(b=>b.type==='castle');
  if(cb){cb.constructionEnd=G.castleUpgrading;cb.constructionDuration=dur;}
  closeModal();showToast(`Expanding the trash empire to Lv${G.castleLevel+1}! ⚒️`);updateUI();renderBuildings();saveGame();
}

function cspeed(ms,cost){

}
function cfin(cost){
  if(G.gems<cost){showToast('Not enough gems!');return;}
  G.gems-=cost;G.castleUpgrading=Date.now()-1;
  closeModal();showToast('Castle complete! 🎉');spawnP('🏰',5);updateUI();renderBuildings();saveGame();
}

// ═══════════════ BUILD MENU ═══════════════
function openBuildMenu(idx){
  const rows=Object.entries(BD).filter(([k])=>k!=='castle').map(([key,d])=>{
    const ok=isAllowed(key), afford=Number(G.gold)>=d.gc && Number(G.food)>=d.fc;
    const cls=!ok?'nc':!afford?'ca':'';
    
    // Clean HTML click logic
    let clickAction = '';
    if (ok && afford) { clickAction = `startBuild(${idx}, '${key}')`; }
    else if (ok) { clickAction = `showToast('Need more resources!')`; }
    else { clickAction = `showToast('Upgrade Castle to Lv${d.cr}!')`; }
    
    return`<div class="bop ${cls}" onclick="${clickAction}"><div class="boi">${d.e}</div><div class="bon">${d.n}</div><div class="boc">🪙${d.gc}${d.fc?` 🌾${d.fc}`:''}</div><div class="bot">⏱${fmtT(d.bt*1000)}</div>${!ok?`<div class="boreq">Castle Lv${d.cr}</div>`:''}</div>`;
  }).join('');
  
  showModal(`<div class="mt">🏗️ Build</div><div class="msub">Castle Lv${G.castleLevel} · ${cc(G.castleLevel).label} — grayed = locked</div><div class="msc"><div class="bgrid">${rows}</div></div><div class="br" style="margin-top:8px"><button class="gb drk" onclick="closeModal()">Cancel</button></div>`);
}
        
function startBuild(idx,type){
  const d=BD[type]; G.gold-=d.gc; G.food-=d.fc;
  const dur=d.bt*1000;
  const b=G.buildings[idx]; b.type=type;b.level=0;b.constructionEnd=Date.now()+dur;b.constructionDuration=dur;
  closeModal();showToast(`Building ${d.n}… ⚒️`);spawnP('🪙',2);updateUI();renderBuildings();saveGame();
}

// ═══════════════ BUILDING INFO ═══════════════
function openBInfo(idx){
  const b=G.buildings[idx], d=BD[b.type];
  const ml=maxBLevel(), atMax=b.level>=ml;

  // Vault/silo use special cost scaling; all others use standard formula
  let uc, ut;
  if (b.type === 'vault') {
    uc = vaultUpgradeCost(b.level);
    ut = Math.floor(d.bt * b.level * 1.5);
  } else if (b.type === 'silo') {
    uc = siloUpgradeCost(b.level);
    ut = Math.floor(d.bt * b.level * 1.5);
  } else {
    uc = Math.floor(d.gc * 1.6 * b.level);
    ut = Math.floor(d.bt * b.level * 1.5);
  }

  const canU = !atMax && Number(G.gold) >= uc;
  const prod = d.pg>0 ? `+${d.pg*b.level}/s 🪙` : d.pf>0 ? `+${d.pf*b.level}/s 🌾` : 'Passive';

  // Storage-specific stat for vault/silo
  let storageStat = '';
  if (b.type === 'vault' && b.level > 0) {
    const thisCap = Math.round(1000 * Math.pow(1.5, b.level - 1));
    const nextCap = atMax ? null : Math.round(1000 * Math.pow(1.5, b.level));
    const totalNow = calcMaxGold();
    storageStat = `
      <div class="sr"><span class="sl">Gold Capacity (this vault)</span><span class="sv" style="color:var(--gold)">+${thisCap.toLocaleString()}</span></div>
      <div class="sr"><span class="sl">Total Max Gold</span><span class="sv">${totalNow.toLocaleString()}</span></div>
      ${nextCap ? `<div class="sr"><span class="sl">Next Level Adds</span><span class="sv" style="color:var(--gem)">+${nextCap.toLocaleString()}</span></div>` : ''}`;
  }
  if (b.type === 'silo' && b.level > 0) {
    const thisCap = Math.round(500 * Math.pow(1.5, b.level - 1));
    const nextCap = atMax ? null : Math.round(500 * Math.pow(1.5, b.level));
    const totalNow = calcMaxFood();
    storageStat = `
      <div class="sr"><span class="sl">Food Capacity (this silo)</span><span class="sv" style="color:var(--green)">+${thisCap.toLocaleString()}</span></div>
      <div class="sr"><span class="sl">Total Max Food</span><span class="sv">${totalNow.toLocaleString()}</span></div>
      ${nextCap ? `<div class="sr"><span class="sl">Next Level Adds</span><span class="sv" style="color:var(--gem)">+${nextCap.toLocaleString()}</span></div>` : ''}`;
  }

  // Pinch-point hint for vault/silo when player can't afford
  const isPinch = (b.type==='vault'||b.type==='silo') && !canU && !atMax;
  const pinchHint = isPinch ? `<div style="font-size:10px;color:var(--orange);text-align:center;margin-top:6px;padding:6px;background:#1a1505;border-radius:6px;border:1px solid var(--orange)33">💡 Vault full = mines waste gold. Buy a <b style="color:var(--gold)">Vault Key</b> from the Shop to temporarily exceed your cap and upgrade!</div>` : '';

  // Garrison panel — show on garrison-eligible buildings
  const garrisonEligible = ['goldmine','farm','barracks'].includes(b.type);
  let garrisonPanel = '';
  if (garrisonEligible) {
    const garrisonHeroId = G.garrison[idx] || null;
    // Check both hero pools
    const garrisonHero = garrisonHeroId
      ? (G.decaySquad.find(h=>h.id===garrisonHeroId) || G.heroes.find(h=>h.id===garrisonHeroId))
      : null;
    garrisonPanel = `
      <div style="margin-top:10px;padding:9px;background:#0d1020;border:1px solid ${garrisonHero?'var(--purple)':'var(--border)'};border-radius:8px">
        <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--text-dim);letter-spacing:.5px;margin-bottom:6px">🛡️ GARRISON SLOT</div>
        ${garrisonHero
          ? `<div style="display:flex;align-items:center;gap:9px">
               <span style="font-size:28px">${garrisonHero.emoji}</span>
               <div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:11px;font-weight:700">${garrisonHero.name}</div><div style="font-size:10px;color:var(--gem);margin-top:1px">${garrisonHero.garrisonDesc}</div></div>
               <button class="gb pur" style="flex:none;padding:5px 9px;font-size:10px" onclick="closeModal();openGarrisonPicker(${idx})">Change</button>
             </div>`
          : `<div style="text-align:center;padding:4px 0">
               <div style="font-size:11px;color:var(--text-dim);margin-bottom:7px">No hero stationed here</div>
               <button class="gb pur" style="width:100%;font-size:10px;padding:7px" onclick="closeModal();openGarrisonPicker(${idx})">⚔ Assign Hero</button>
             </div>`
        }
      </div>`;
  }

  let upgBtn = '';
  if (!atMax) {
    if (canU) { upgBtn = `<button class="gb gld" onclick="upgB(${idx})">⬆ Upgrade</button>`; }
    else { upgBtn = `<button class="gb gld" onclick="showToast('Not enough gold — buy overflow from Shop to bridge the gap!')" style="opacity:.45">⬆ Upgrade</button>`; }
  }

  showModal(`
    <span style="font-size:48px;display:block;text-align:center;margin:4px 0">${d.e}</span>
    <div class="mt">${d.n}</div><div class="msub">${d.desc}</div>
    <div style="margin:8px 0">
      <div class="sr"><span class="sl">Level</span><span class="sv">${b.level} / ${ml}</span></div>
      <div class="sr"><span class="sl">Output</span><span class="sv">${prod}</span></div>
      ${storageStat}
      ${!atMax ? `<div class="sr"><span class="sl">Upgrade Cost</span><span class="sv">🪙 ${uc.toLocaleString()}</span></div><div class="sr"><span class="sl">Upgrade Time</span><span class="sv">⏱ ${fmtT(ut*1000)}</span></div>` : `<div class="sr"><span class="sl">Status</span><span class="sv" style="color:var(--gold)">MAXED at Castle Lv${G.castleLevel} 🗑️</span></div>`}
    </div>
    ${pinchHint}
    ${garrisonPanel}
    <div class="br">
      <button class="gb drk" onclick="closeModal()">Close</button>
      ${upgBtn}
    </div>
  `);
}
function upgB(idx){
  const b=G.buildings[idx], d=BD[b.type];
  let cost, dur;
  if (b.type === 'vault') {
    cost = vaultUpgradeCost(b.level);
    dur = Math.floor(d.bt * b.level * 1.5) * 1000;
  } else if (b.type === 'silo') {
    cost = siloUpgradeCost(b.level);
    dur = Math.floor(d.bt * b.level * 1.5) * 1000;
  } else {
    cost = Math.floor(d.gc * 1.6 * b.level);
    dur = Math.floor(d.bt * b.level * 1.5) * 1000;
  }
  G.gold -= cost; b.constructionEnd = Date.now() + dur; b.constructionDuration = dur;
  closeModal(); showToast(`Upgrading ${d.n} to Lv${b.level+1}…`); updateUI(); renderBuildings(); saveGame();
}

// ═══════════════ SPEEDUP ═══════════════
function openSpeedup(idx){
  const b=G.buildings[idx], d=BD[b.type];
  const rem=Math.max(0,b.constructionEnd-Date.now()), gc=Math.ceil(rem/60000);
  showModal(`
    <div class="mt">⚡ Speed Up</div><div class="msub">${d.e} ${d.n} — ${fmtT(rem)} remaining</div>
    <div class="spo" onclick="useSpeedup(${idx},3600000,50)"><span style="font-size:20px">⚡</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:12px">1-Hour Boost</div><div style="font-size:11px;color:var(--gem)">50 💎</div></div></div>
    <div class="spo" onclick="useSpeedup(${idx},28800000,200)"><span style="font-size:20px">⚡⚡</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:12px">8-Hour Boost</div><div style="font-size:11px;color:var(--gem)">200 💎</div></div></div>
    <div class="spo" onclick="finNow(${idx},${gc})"><span style="font-size:20px">✨</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:12px">Finish Now!</div><div style="font-size:11px;color:var(--gem)">${gc} 💎</div></div></div>
    <div class="br" style="margin-top:7px"><button class="gb drk" onclick="closeModal()">Not Now</button></div>
  `);
}
function useSpeedup(idx,ms,cost){
  if(G.gems<cost){showToast('Not enough gems!');return;}
  G.gems-=cost; G.buildings[idx].constructionEnd-=ms;
  closeModal();showToast('Speed boost applied! ⚡');bump('mchip');spawnP('⚡',3);updateUI();renderBuildings();saveGame();
}
function finNow(idx,cost){
  if(G.gems<cost){showToast('Not enough gems!');return;}
  G.gems-=cost;
  const b=G.buildings[idx];b.constructionEnd=null;b.level=(b.level||0)+1;
  closeModal();showToast('Construction complete! 🎉');spawnP('✨',4);bump('mchip');updateUI();renderBuildings();saveGame();
}

// ═══════════════ TROOPS ═══════════════
function openTroops() {
  const brx = G.buildings.find(b => b.type === 'barracks' && !b.constructionEnd);
  let h = `<div class="mt">⚔️ Troop Training</div>`;
  if (!brx) {
    h += `<div class="msub" style="color:var(--orange)">Build a Barracks first — even trash lords need soldiers!</div>`;
  } else {
    const brxLvl = brx.level;
    const speedMult = Math.pow(0.85, brxLvl - 1);
    h += `<div class="msub">Barracks Lv${brxLvl} — Recruit your army of trash warriors (+${Math.round((1 - speedMult)*100)}% speed boost)</div>`;
    h += `<div class="msc" id="troop-msc"></div>`; // Wrapper for dynamic content
  }
  h += `<div class="br" style="margin-top:10px"><button class="gb drk" onclick="closeModal()">Close</button><button class="gb gld" onclick="closeModal();setTab('b')">⚡ Battle!</button></div>`;
  showModal(h);
  
  if (brx) {
    renderTroopUIInPlace();
  }
}

function renderTroopUIInPlace() {
  const brx = G.buildings.find(b => b.type === 'barracks' && !b.constructionEnd);
  const scrollArea = document.getElementById('troop-msc');
  if (!scrollArea || !brx) return;

  const brxLvl = brx.level;
  const speedMult = Math.pow(0.85, brxLvl - 1);
  
  let newHtml = `<div class="tgrid">`;
  Object.entries(TD).forEach(([id, d]) => {
    const realTt = d.tt * speedMult;
    const t = G.troops[id];
    const unlk = G.castleLevel >= d.cr;
    const afford = G.gold >= d.gc && G.food >= d.fc;
    const now = Date.now();
    const next = t.training.length > 0 ? fmtT(Math.max(0, t.training[0].finishAt - now)) : '';
    const pct = t.training.length > 0 ? Math.round((1 - (t.training[0].finishAt - now) / (realTt * 1000)) * 100) : 0;
    
    newHtml += `<div class="tc">
      ${t.count > 0 ? `<span class="tcb">${t.count}</span>` : ''}
      <span class="tce">${d.e}</span>
      <div class="tcn">${d.n}</div>
      <div class="tcs">❤️${d.hp} ⚔️${d.dmg}</div>
      <div class="tcc">🪙${d.gc} 🌾${d.fc}</div>
      ${!unlk ? `<div style="font-size:9px;color:var(--red);margin-top:3px">Castle Lv${d.cr}</div>` :
        `<button class="ttr" onclick="trainTroop('${id}')" style="${afford ? '' : 'opacity:.5;cursor:not-allowed'}">${afford ? `+Train (${fmtT(realTt * 1000)})` : 'Need Resources'}</button>`}
      ${t.training.length > 0 ? `<div class="tpb"><div class="tpf" style="width:${pct}%"></div></div><div style="font-size:8px;color:var(--blue);margin-top:2px">${t.training.length} training · ${next}</div>` : ''}
    </div>`;
  });
  newHtml += `</div>`;
  
  // Re-append the army summary
  const total = Object.values(G.troops).reduce((a, t) => a + t.count, 0);
  newHtml += `<div style="margin-top:12px;font-family:'Cinzel',serif;font-size:12px;color:var(--text-dim);margin-bottom:6px">🗑️ Your Trash Army (${total} warriors)</div>`;
  Object.entries(TD).forEach(([id, d]) => {
    const t = G.troops[id];
    if (t.count > 0) newHtml += `<div style="display:flex;align-items:center;gap:8px;padding:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:7px;margin-bottom:5px"><span style="font-size:24px">${d.e}</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:11px">${d.n} ×${t.count}</div><div style="font-size:10px;color:var(--blue)">⚔ Dmg:${d.dmg} ❤ HP:${d.hp}</div></div></div>`;
  });
  if (total === 0) newHtml += `<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:8px">No warriors yet. Your trash kingdom is defenseless! 😬</div>`;
  
  scrollArea.innerHTML = newHtml;
}

function trainTroop(id) {
  const d = TD[id];
  const t = G.troops[id];
  
  if (G.gold < d.gc || G.food < d.fc) { 
    showToast('Insufficient resources for recruitment!'); 
    return; 
  }
  
  const brx = G.buildings.find(b => b.type === 'barracks');
  const speedMult = brx ? Math.pow(0.85, brx.level - 1) : 1;
  const realTt = d.tt * speedMult;

  G.gold -= d.gc; 
  G.food -= d.fc;
  t.training.push({ finishAt: Date.now() + (realTt * 1000) });

  updateUI();
  renderTroopUIInPlace();
  showToast(`Recruiting ${d.e} ${d.n}...`);
  saveGame();
}

    </div>

function upgH(i){
  const h = G.heroes[i];
  const isKaiMan = h.id === 'kaiman';
  const cost = isKaiMan ? (h.level * 500) : (h.level * 80);

  // 1. Final state verification
  if (isKaiMan) {
    if (G.food < cost) { showToast('Insufficient Food!'); return; }
    G.food -= cost; // Execute the Food Sink
  } else {
    if (G.gems < cost) { showToast('Insufficient Gems!'); return; }
    G.gems -= cost;
  }

  if (h.xp < h.xpNeeded) return;

  // 2. State Mutation
  h.level++;
  h.xp = 0;
  // XP needed scales: ×1.5 per level, decelerates after Lv5
  h.xpNeeded = h.level <= 5
    ? Math.floor(h.xpNeeded * 1.5)
    : Math.floor(h.xpNeeded * 2.0); // steeper past Lv5 = manufactured friction

  // 3. UI Sync
  closeModal();
  updateUI(); // Immediate Topbar update
  saveGame();
  
  showToast(`${h.emoji} ${h.name} → Level ${h.level}! ⚔ ${110 + h.level * 20} Power`);
  spawnP(isKaiMan ? '🌾' : '🌟', 5);
}

function earnXP(i){
  G.heroes[i].xp = Math.min(G.heroes[i].xpNeeded, G.heroes[i].xp + 15);
  closeModal();
  openHD(i);
  showToast('+15 XP! Keep training Kai Man!');
}

function deployTroop(ev){
  if(!BS)return;
  const id=G.selTroop; const cnt=BS.troops[id]||0;
  if(cnt<=0){showToast('No '+TD[id].n+' left!');return;}
  BS.troops[id]--; G.troops[id].count=Math.max(0,G.troops[id].count-1);

  const field=document.getElementById('bfield'); const rect=field.getBoundingClientRect();
  const px=(ev.clientX-rect.left)/rect.width*100;
  const py=(ev.clientY-rect.top)/rect.height*100;

  // find nearest alive building
  let best=-1, bestD=Infinity;
  BS.buildings.forEach((b,i)=>{if(b.hp<=0)return;const d=(b.x-px)**2+(b.y-py)**2;if(d<bestD){bestD=d;best=i;}});
  if(best===-1){checkWin();return;}

  const d=TD[id], tgt=BS.buildings[best];
  const dmg=d.dmg+Math.floor(Math.random()*10);
  tgt.hp=Math.max(0,tgt.hp-dmg);

  // damage float
  const fx=rect.left+tgt.x/100*rect.width, fy=rect.top+tgt.y/100*rect.height;
  const fl=document.createElement('div'); fl.className='dmgf'; fl.textContent=`-${dmg}`;
  fl.style.left=fx+'px'; fl.style.top=fy+'px';
  document.body.appendChild(fl); setTimeout(()=>fl.remove(),900);

  // update building el
  const bEl=document.getElementById(`eb${best}`);
  if(bEl){
    if(tgt.hp<=0){
      bEl.classList.add('dst'); setTimeout(()=>bEl.remove(),500);
      spawnP('💥',3); BS.loot+=Math.floor(BS.enemy.loot/BS.buildings.length);
    } else {
      bEl.classList.add('shk'); setTimeout(()=>bEl.classList.remove('shk'),350);
      bEl.querySelector('.ehf').style.width=Math.round(tgt.hp/tgt.mhp*100)+'%';
    }
  }

  BS.currentHp=BS.buildings.reduce((a,b)=>a+Math.max(0,b.hp),0);
  updateBHUD(); updDeploy(); checkWin();
}

function checkWin(){
  const pct=1-BS.currentHp/BS.totalHp;
  if(pct>=0.33)awardStar(1); if(pct>=0.66)awardStar(2); if(pct>=1){awardStar(3);setTimeout(()=>endBattle(true),600);}
}

  } else if(BS){showToast('Retreated.');}
  BS=null;
  document.getElementById('bscr').classList.remove('act');
  updateUI();
}

// ═══════════════ SUMMONING ALTAR ═══════════════
const PULL_COSTS = { single: 50, ten: 450 };

// Weighted pool for pulls
const PULL_POOL = {
  common: ['scrappy','cardboard'],
  rare:   ['mary','sludge','alchemist','rottop'],
  legend: ['lint','compost','golem','prince'],
};

function rollRarity() {
  const r = Math.random() * 100;
  if (r < 5)  return 'legend';
  if (r < 30) return 'rare';
  return 'common';
}

function rollPull() {
  const rarity = rollRarity();
  const pool = PULL_POOL[rarity];
  const heroId = pool[Math.floor(Math.random() * pool.length)];
  const hero = G.decaySquad.find(h => h.id === heroId);
  // Shard count by rarity
  const shardCounts = { common: [5,10], rare: [3,8], legend: [1,3] };
  const [min, max] = shardCounts[rarity];
  const shards = min + Math.floor(Math.random() * (max - min + 1));
  return { heroId, rarity, shards, hero };
}

function doPull(count) {
  const cost = count === 1 ? PULL_COSTS.single : PULL_COSTS.ten;
  if (G.gems < cost) { showToast('Not enough gems! Visit Shop 💎'); return; }
  G.gems -= cost;
  bump('mchip');

  const results = [];
  for (let i = 0; i < count; i++) results.push(rollPull());

  // Apply shards
  let newAssemblies = [];
  results.forEach(r => {
    if (!r.hero) return;
    r.hero.shards = (r.hero.shards || 0) + r.shards;
    if (!r.hero.unlocked && r.hero.shards >= r.hero.shardsNeeded) {
      r.hero.unlocked = true;
      r.hero.level = 1;
      newAssemblies.push(r.hero);
    }
  });

  saveGame();
  showPullAnimation(results, newAssemblies);
}

function showPullAnimation(results, newAssemblies) {
  const overlay = document.getElementById('altar-overlay');
  const fireEl = document.getElementById('pull-fire-emoji');
  const labelEl = document.getElementById('pull-label');

  // Stage 1: fire animation
  overlay.classList.add('act');
  fireEl.textContent = '🔥';
  labelEl.textContent = 'Channeling the Dumpster…';

  setTimeout(() => {
    fireEl.textContent = '🔮';
    labelEl.textContent = 'The spirits stir…';
  }, 600);

  setTimeout(() => {
    overlay.classList.remove('act');
    // Show results in altar body
    renderAltarResults(results, newAssemblies);
    // Feedback
    const hasLegend = results.some(r => r.rarity === 'legend');
    const hasRare = results.some(r => r.rarity === 'rare');
    if (hasLegend) { spawnP('✨', 8); showToast('LEGENDARY SHARDS! 🌟 The trash gods smile!'); }
    else if (hasRare) { spawnP('💫', 5); showToast('Rare shards obtained! ⚡'); }
    else { spawnP('🔮', 3); showToast('Shards collected! Keep pulling!'); }
    newAssemblies.forEach(h => {
      setTimeout(() => { spawnP(h.emoji, 6); showToast(`${h.emoji} ${h.name} ASSEMBLED! New hero unlocked!`); }, 400);
    });
    updateUI();
  }, 1400);
}

  const body = document.getElementById('altar-body');

function renderAltarMain() {
  const body = document.getElementById('altar-body');
  document.getElementById('altar-gems').textContent = fmt(G.gems);

  // Rarity sort order
  const rarityOrder = {common:0,rare:1,legend:2};

    const fillClass = {common:'fill-common',rare:'fill-rare',legend:'fill-legend'}[h.rarity];
    const rarityLabel = {common:'COMMON',rare:'RARE',legend:'LEGEND'}[h.rarity];

    let actionBtn = '';

      actionBtn = `<button class="assemble-btn" style="background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border);cursor:default">${garrisonedAt !== null ? '⚔ Deployed' : '✅ Assembled'}</button>`;

      actionBtn = `<button class="assemble-btn" style="background:linear-gradient(135deg,var(--gem-dark),var(--gem));color:#001a0e" onclick="assembleHero('${h.id}')">⚡ ASSEMBLE!</button>`;
    } else {
      actionBtn = `<button class="assemble-btn" style="background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border);cursor:default">${h.shards}/${h.shardsNeeded} 🔷</button>`;
    }

    return `<div class="altar-hero-card ${rarityClass} ${unlkClass}">
      <span class="altar-rarity-badge ${badgeClass}">${rarityLabel}</span>
      <span style="font-size:36px;display:block;margin:8px 0 3px;${h.unlocked?'':'filter:grayscale(.7)'}">${h.emoji}</span>
      <div style="font-family:'Cinzel',serif;font-size:9px;font-weight:700;${h.unlocked?'':'color:var(--text-dim)'}">${h.name}</div>
      <div style="font-size:8px;color:var(--text-dim);margin-top:2px">${h.garrisonDesc}</div>
      <div class="shard-bar"><div class="shard-bar-fill ${fillClass}" style="width:${pct}%"></div></div>
      ${actionBtn}
    </div>`;
  }).join('');

  // Odds table
  const oddsHtml = `<div style="background:#0a0618;border:1px solid #3a1060;border-radius:8px;padding:9px;margin-bottom:12px">
    <div style="font-family:'Cinzel',serif;font-size:9px;color:var(--text-dim);letter-spacing:.5px;margin-bottom:6px">📊 PULL RATES</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;text-align:center">
      <div style="font-size:9px"><div style="color:#8ab0c0;font-family:'Cinzel',serif;font-weight:700">COMMON</div><div style="color:var(--text-dim)">70%</div><div style="color:#8ab0c0;font-size:8px">5–10 shards</div></div>
      <div style="font-size:9px"><div style="color:#5aacff;font-family:'Cinzel',serif;font-weight:700">RARE</div><div style="color:var(--text-dim)">25%</div><div style="color:#5aacff;font-size:8px">3–8 shards</div></div>
      <div style="font-size:9px"><div style="color:var(--gold);font-family:'Cinzel',serif;font-weight:700">LEGEND</div><div style="color:var(--text-dim)">5%</div><div style="color:var(--gold);font-size:8px">1–3 shards</div></div>
    </div>
  </div>`;

  body.innerHTML = `
    <div class="altar-pull-zone">
      <span class="altar-cauldron">🪣</span>
      <div class="altar-pull-title">Dumpster of Destiny</div>
      <div class="altar-pull-sub">Spend Gems · Earn Shards · Assemble Heroes</div>
      <div class="pull-btns">
        <button class="pull-btn" onclick="doPull(1)">🔮 Pull ×1<span class="pbc">${PULL_COSTS.single} 💎</span></button>
        <button class="pull-btn" onclick="doPull(10)">🔮 Pull ×10<span class="pbc">${PULL_COSTS.ten} 💎 <span style="font-size:8px;color:var(--gem)">SAVE 50</span></span></button>
      </div>
    </div>
    ${oddsHtml}
    <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--text-dim);letter-spacing:.5px;margin-bottom:8px">🏚️ DECAY SQUAD ROSTER</div>
    <div class="altar-roster">${cards}</div>
    <div style="margin-top:10px;font-size:10px;color:var(--text-dim);text-align:center">Garrison assembled heroes in Mines, Farms & Barracks for global buffs!</div>
  `;
}

function assembleHero(id) {
  const h = G.decaySquad.find(x => x.id === id);
  if (!h || h.unlocked || h.shards < h.shardsNeeded) return;
  h.unlocked = true;
  h.level = 1;
  h.shards = h.shardsNeeded; // cap at needed (don't overflow display)
  saveGame();
  spawnP(h.emoji, 7);
  showToast(`${h.emoji} ${h.name} assembled! Assign to a building for buffs!`);
  renderAltarMain();
}

function openAltar() {
  document.getElementById('altar-screen').classList.add('act');
  document.getElementById('altar-gems').textContent = fmt(G.gems);
  renderAltarMain();
}

function closeAltar() {
  document.getElementById('altar-screen').classList.remove('act');
}

// ═══════════════ SHOP ═══════════════
const SHOP=[
  {id:'g80',  i:'💎',n:'80 Gems',      d:'Starter pack',       p:'$0.99', gems:80},
  {id:'g500', i:'💎',n:'500 Gems',     d:'Popular · Best deal',p:'$4.99', gems:500,tag:'POPULAR'},
  {id:'g1200',i:'💎',n:'1,200 Gems',   d:'Chest of gems',      p:'$9.99', gems:1200},
  {id:'g2600',i:'💎',n:'2,600 Gems',   d:'+200 bonus',         p:'$19.99',gems:2600,tag:'VALUE'},
  {id:'gp',   i:'🪙',n:'Gold Pack',    d:'10,000 gold now',    p:'100 💎',cost:100,type:'gold',amt:10000},
  {id:'s1h',    i:'⚡', n:'1-Hr Speedup',  d:'Any building',                        p:'50 💎',  cost:50,  type:'spd', ms:3600000},
  {id:'s8h',    i:'⚡', n:'8-Hr Speedup',  d:'Any building',                        p:'200 💎', cost:200, type:'spd', ms:28800000},
  {id:'pouch',  i:'👝', n:'Small Pouch',   d:'+20% storage for 12h',                p:'15 💎',  cost:15,  type:'overflow', bonus:0.20, dur:43200000},
  {id:'bucket', i:'🪣', n:'Golden Bucket', d:'+50% storage for 24h',                p:'50 💎',  cost:50,  type:'overflow', bonus:0.50, dur:86400000},
  {id:'vaultkey',i:'🗝️',n:'Vault Key',    d:'+200% storage for 48h · Best Value',  p:'125 💎', cost:125, type:'overflow', bonus:2.00, dur:172800000, tag:'BEST VALUE'},
];
function openShop(){
  const gemItems   = SHOP.filter(it => it.gems);
  const utilItems  = SHOP.filter(it => it.type === 'gold' || it.type === 'spd');
  const ovItems    = SHOP.filter(it => it.type === 'overflow');

  const renderItems = arr => arr.map(it => {
    const active = it.type==='overflow' && G.overflowExpiry && Date.now()<G.overflowExpiry;
    const timeLeft = active ? ` · ${fmtT(G.overflowExpiry-Date.now())} left` : '';
    return `<div class="si" onclick="buyItem('${it.id}')">
      <span class="sii">${it.i}</span>
      <div><div class="sin">${it.n}${it.tag?` <span style="color:var(--gem);font-size:9px">[${it.tag}]</span>`:''}</div>
      <div class="sid">${it.d}${timeLeft}</div></div>
      <span class="sip" style="${active?'background:var(--text-dim)':''}">${active?'Active':it.p}</span>
    </div>`;
  }).join('');

  showModal(`
    <div class="mt">💎 Gem Shop</div>
    <div class="msub">Power up your trash empire</div>
    <div class="msc">
      <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--text-dim);margin-bottom:6px;letter-spacing:.5px">GEM PACKS</div>
      ${renderItems(gemItems)}
      <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--text-dim);margin:10px 0 6px;letter-spacing:.5px">UTILITY</div>
      ${renderItems(utilItems)}
      <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--orange);margin:10px 0 6px;letter-spacing:.5px">⚠ TEMPORARY OVERFLOW</div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Temporarily exceed your Vault/Silo limits. Resources above cap won't be lost until the timer runs out.</div>
      ${renderItems(ovItems)}
    </div>
    <div class="br" style="margin-top:8px"><button class="gb drk" onclick="closeModal()">Close</button></div>
  `);
}

function buyItem(id){
  const it=SHOP.find(s=>s.id===id);if(!it)return;
  if(it.type==='gold'){
    if(G.gems<it.cost){showToast('Not enough gems!');return;}
    G.gems-=it.cost;G.gold+=it.amt;
    showToast(`+${it.amt.toLocaleString()} Gold! 🪙`);bump('gchip');bump('mchip');spawnP('🪙',4);updateUI();closeModal();saveGame();return;
  }
  if(it.type==='spd'){
    const con=G.buildings.find(b=>b.constructionEnd&&b.type!=='castle');
    if(!con&&!G.castleUpgrading){showToast('Nothing building!');return;}
    if(G.gems<it.cost){showToast('Not enough gems!');return;}
    G.gems-=it.cost;
    if(con)con.constructionEnd-=it.ms;
    if(G.castleUpgrading)G.castleUpgrading-=it.ms;
    showToast('Speed boost! ⚡');bump('mchip');spawnP('⚡',3);updateUI();closeModal();saveGame();return;
  }
  if(it.type==='overflow'){
    if(G.gems<it.cost){showToast('Not enough gems!');return;}
    if(G.overflowExpiry && Date.now()<G.overflowExpiry){showToast('Golden Bucket already active!');return;}
    G.gems-=it.cost;
    G.overflowExpiry = Date.now() + 86400000; // 24 hours
    showToast('🪣 Golden Bucket active! +50% storage for 24h');bump('mchip');spawnP('🪙',5);updateUI();closeModal();saveGame();return;
  }
  G.gems+=it.gems;showToast(`+${it.gems} Gems! 💎`);bump('mchip');spawnP('💎',4);updateUI();closeModal();saveGame();
}

// ═══════════════ TABS ═══════════════
function setTab(tab){
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('active',['v','t','h','a','c','b'][i]===tab));
  closeModal();
  if(tab==='t')openTroops();
  else if(tab==='h')openHeroes();
  else if(tab==='a')openAltar();
  else if(tab==='c')openClan();
  else if(tab==='b')openBSearch();
  // close altar if navigating away
  if(tab!=='a') document.getElementById('altar-screen').classList.remove('act');
}

// ═══════════════ HELPERS ═══════════════
let TT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(TT);TT=setTimeout(()=>t.classList.remove('show'),2600);
}
function spawnP(em,n){
  const cx=innerWidth/2,cy=innerHeight/2;
  for(let i=0;i<n;i++) setTimeout(()=>{
    const p=document.createElement('div');p.className='fp';p.textContent=em;
    p.style.left=(cx+(Math.random()-.5)*110)+'px';p.style.top=(cy+(Math.random()-.5)*70)+'px';
    document.body.appendChild(p);setTimeout(()=>p.remove(),950);
  },i*75);
}

// Shatter animation: resource icon floats up, grays out, shows LOST — only fires ~every 4s per building
const _lostThrottle = {};
function spawnLost(em, building) {
  const key = `${building.slot}`;
  const now = Date.now();
  if (_lostThrottle[key] && now - _lostThrottle[key] < 4000) return;
  _lostThrottle[key] = now;

  // Find the building's DOM element to anchor the animation near it
  const wi = document.getElementById('world-inner');
  const slots = wi.querySelectorAll('.bs');
  const el = slots[building.slot];
  if (!el) return;
  const rect = el.getBoundingClientRect();

  const p = document.createElement('div');
  p.style.cssText = `
    position:fixed;pointer-events:none;z-index:600;
    left:${rect.left + rect.width/2 - 16}px;
    top:${rect.top + rect.height/2}px;
    font-size:14px;display:flex;flex-direction:column;align-items:center;gap:1px;
    animation:lostFloat 1.4s ease-out forwards;
  `;
  p.innerHTML = `<span style="filter:grayscale(1);opacity:.7">${em}</span><span style="font-family:'Cinzel',serif;font-size:8px;font-weight:700;color:#888;letter-spacing:.5px">LOST</span>`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 1500);
}

loadGame();
updateUI();renderBuildings();
setTimeout(tick,1000);
showToast('Welcome to Kingdom of Trash! 🗑️');
