<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingdom Forge</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5c842;
            --gold-dark: #c9940a;
            --gem: #3de8a0;
            --gem-dark: #1ab875;
            --bg-dark: #0d1117;
            --bg-panel: #1a2030;
            --bg-card: #1e2840;
            --border: #2d3a55;
            --border-bright: #3d5080;
            --text: #e8dfc8;
            --text-dim: #8899aa;
            --red: #e84040;
            --blue: #4080e8;
            --purple: #9b59b6;
            --orange: #e87820;
            --green: #2ecc71
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Crimson Pro',serif;
            color: var(--text);
            touch-action: manipulation
        }

        /* TOPBAR */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg,#0a0e16,#0d1117cc);
            border-bottom: 1px solid var(--border);
            padding: 6px 10px;
            backdrop-filter: blur(8px);
            gap: 6px
        }

        .res-group {
            display: flex;
            gap: 6px;
            flex: 1
        }

        .res-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 8px 4px 6px;
            font-family: 'Cinzel',serif;
            font-size: 12px;
            font-weight: 700;
            transition: transform .15s
        }

            .res-chip.bump {
                transform: scale(1.18)
            }

            .res-chip .val {
                color: var(--gold)
            }

        .gem-chip .val {
            color: var(--gem) !important
        }

        .castle-badge {
            font-family: 'Cinzel',serif;
            font-size: 12px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: .5px;
            text-shadow: 0 0 12px #f5c84255;
            cursor: pointer;
            white-space: nowrap
        }

        
/* WORLD */
#world{position:fixed;top:54px;bottom:114px;left:0;right:0;overflow-y:auto;background:radial-gradient(ellipse at 50% 80%,#1a3020 0%,transparent 60%),radial-gradient(ellipse at 20% 20%,#1a2530 0%,transparent 50%),linear-gradient(180deg,#0d1520,#0d1a10)}
#world::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 32px,#ffffff04 32px,#ffffff04 33px),repeating-linear-gradient(90deg,transparent,transparent 32px,#ffffff04 32px,#ffffff04 33px);pointer-events:none;min-height:100%}
#world-inner{position:relative;min-height:100%;display:grid;gap:5px;padding:8px;padding-bottom:24px}

        .deco-tree {
            position: absolute;
            font-size: 22px;
            pointer-events: none;
            animation: sway 4s ease-in-out infinite
        }

        @keyframes sway {
            0%,100% {
                transform: rotate(-2deg)
            }

            50% {
                transform: rotate(2deg)
            }
        }

        /* BUILDING SLOTS */
        .bs {
            background: linear-gradient(145deg,#1a2535,#111822);
            border: 1px solid var(--border);
            border-radius: 9px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform .12s,box-shadow .12s,border-color .12s;
            position: relative;
            overflow: hidden;
            aspect-ratio: 1
        }

            .bs:active {
                transform: scale(0.91)
            }

            .bs.has {
                background: linear-gradient(145deg,#1e2d45,#151e30);
                border-color: var(--border-bright)
            }

                .bs.has:hover {
                    border-color: var(--gold);
                    box-shadow: 0 0 12px #f5c84233
                }

            .bs.cas {
                border-color: #a07020;
                background: linear-gradient(145deg,#2a2010,#1a1408)
            }

                .bs.cas:hover {
                    border-color: var(--gold);
                    box-shadow: 0 0 18px #f5c84244
                }

            .bs.con {
                border-color: var(--orange);
                animation: cpulse 1.5s ease-in-out infinite
            }

        @keyframes cpulse {
            0%,100% {
                box-shadow: 0 0 6px #e8782044
            }

            50% {
                box-shadow: 0 0 16px #e87820aa
            }
        }

        .bs.empty {
            border-style: dashed;
            border-color: #2a3550;
            background: transparent;
            opacity: .55
        }

            .bs.empty:hover {
                opacity: 1;
                border-color: var(--gold)
            }

        .bs.lk {
            border-style: dashed;
            border-color: #1e2535;
            background: transparent;
            opacity: .25;
            cursor: not-allowed
        }

        .be {
            font-size: 24px;
            line-height: 1
        }

        .bn {
            font-family: 'Cinzel',serif;
            font-size: 8px;
            color: var(--text-dim);
            margin-top: 2px;
            text-align: center
        }

        .bl {
            position: absolute;
            top: 3px;
            right: 5px;
            font-family: 'Cinzel',serif;
            font-size: 10px;
            color: var(--gold);
            font-weight: 700
        }

        .pb {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #ffffff11
        }

        .pf {
            height: 100%;
            background: var(--orange);
            border-radius: 2px;
            transition: width 1s linear
        }

        .tl {
            position: absolute;
            bottom: 4px;
            font-size: 8px;
            color: var(--orange);
            font-family: 'Cinzel',serif
        }

        .pi {
            font-size: 18px;
            color: #2a3550
        }

        .empty:hover .pi {
            color: var(--gold)
        }

        /* BOTTOM NAV */
        #bnav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            background: linear-gradient(0deg,#080c12,#0d1117);
            border-top: 1px solid var(--border);
            height: 114px
        }

        .nb {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            padding: 8px 2px;
            border: none;
            background: none;
            color: var(--text-dim);
            font-family: 'Cinzel',serif;
            font-size: 9px;
            letter-spacing: .3px;
            transition: background .15s
        }

            .nb:active {
                background: #ffffff08
            }

            .nb.active {
                color: var(--gold)
            }

        .ni {
            font-size: 22px
        }

        .nb.active .ni {
            filter: drop-shadow(0 0 5px #f5c84280)
        }

        /* MODALS */
        .mo {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #00000088;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: flex-end;
            animation: fi .18s ease
        }

        @keyframes fi {
            from {
                opacity: 0
            }
        }

        .mo.ctr {
            align-items: center;
            justify-content: center
        }

        .ms {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-panel);
            border: 1px solid var(--border-bright);
            border-radius: 16px 16px 0 0;
            padding: 14px 13px 26px;
            animation: su .22s cubic-bezier(.34,1.56,.64,1)
        }

        @keyframes su {
            from {
                transform: translateY(100%)
            }
        }

        .ms.cs {
            border-radius: 14px;
            margin: 14px;
            width: auto;
            animation: pi2 .22s cubic-bezier(.34,1.56,.64,1)
        }

        @keyframes pi2 {
            from {
                transform: scale(.85);
                opacity: 0
            }
        }

        .mh {
            width: 34px;
            height: 4px;
            background: var(--border-bright);
            border-radius: 2px;
            margin: 0 auto 12px
        }

        .mt {
            font-family: 'Cinzel',serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 2px;
            text-shadow: 0 0 16px #f5c84244
        }

        .msub {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 10px
        }

        .msc {
            max-height: 52vh;
            overflow-y: auto;
            padding-right: 2px
        }

            .msc::-webkit-scrollbar {
                width: 3px
            }

            .msc::-webkit-scrollbar-thumb {
                background: var(--border-bright);
                border-radius: 2px
            }

        /* BUILD GRID */
        .bgrid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 7px;
            margin-top: 8px
        }

        .bop {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 9px 5px;
            text-align: center;
            cursor: pointer;
            transition: all .15s
        }

            .bop:hover {
                border-color: var(--gold);
                background: #1e2d45
            }

            .bop:active {
                transform: scale(.93)
            }

        .boi {
            font-size: 24px
        }

        .bon {
            font-family: 'Cinzel',serif;
            font-size: 9px;
            color: var(--text);
            margin-top: 2px
        }

        .boc {
            font-size: 10px;
            color: var(--gold);
            margin-top: 1px
        }

        .bot {
            font-size: 9px;
            color: var(--text-dim)
        }

        .boreq {
            font-size: 9px;
            color: var(--red)
        }

        .bop.ca {
            opacity: .42;
            cursor: not-allowed
        }

        .bop.nc {
            opacity: .32;
            cursor: not-allowed
        }

        /* STAT ROWS */
        .sr {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px
        }

            .sr:last-child {
                border-bottom: none
            }

        .sl {
            color: var(--text-dim)
        }

        .sv {
            color: var(--text);
            font-weight: 600
        }

        /* BUTTONS */
        .br {
            display: flex;
            gap: 7px;
            margin-top: 10px
        }

        .gb {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-family: 'Cinzel',serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            letter-spacing: .3px
        }

            .gb:active {
                transform: scale(.95)
            }

        .gld {
            background: linear-gradient(135deg,var(--gold-dark),var(--gold));
            color: #1a1000
        }

        .gem {
            background: linear-gradient(135deg,var(--gem-dark),var(--gem));
            color: #001a0e
        }

        .pur {
            background: linear-gradient(135deg,#6c3483,var(--purple));
            color: #fff
        }

        .blu {
            background: linear-gradient(135deg,#1a3a6a,var(--blue));
            color: #fff
        }

        .grn {
            background: linear-gradient(135deg,#1a6a2a,var(--green));
            color: #fff
        }

        .drk {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-dim)
        }

        /* SHOP ITEMS */
        .si {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 10px;
            cursor: pointer;
            transition: border-color .15s;
            margin-bottom: 7px
        }

            .si:hover {
                border-color: var(--gem)
            }

            .si:active {
                transform: scale(.98)
            }

        .sii {
            font-size: 30px
        }

        .sin {
            font-family: 'Cinzel',serif;
            font-size: 12px;
            font-weight: 700;
            flex: 1
        }

        .sid {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 1px
        }

        .sip {
            font-family: 'Cinzel',serif;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg,var(--gem-dark),var(--gem));
            padding: 5px 9px;
            border-radius: 14px;
            white-space: nowrap
        }

        /* HEROES */
        .hgrid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 8px;
            margin-top: 8px
        }

        .hc {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 11px;
            text-align: center;
            cursor: pointer;
            transition: all .15s;
            position: relative
        }

            .hc:hover {
                border-color: var(--purple);
                box-shadow: 0 0 10px #9b59b633
            }

        .hci {
            font-size: 38px;
            display: block;
            margin-bottom: 3px
        }

        .hcn {
            font-family: 'Cinzel',serif;
            font-size: 10px;
            font-weight: 700
        }

        .hcl {
            font-size: 9px;
            color: var(--purple);
            margin-top: 2px
        }

        .hcb {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--purple);
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 7px
        }

        .hc.lkd {
            opacity: .38
        }

        .xpb {
            height: 3px;
            background: #ffffff13;
            border-radius: 2px;
            margin-top: 5px
        }

        .xpf {
            height: 100%;
            background: var(--purple);
            border-radius: 2px;
            transition: width .5s
        }

        /* TROOPS */
        .tgrid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 7px;
            margin-top: 8px
        }

        .tc {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 9px;
            text-align: center;
            cursor: default;
            position: relative
        }

        .tce {
            font-size: 32px;
            display: block
        }

        .tcn {
            font-family: 'Cinzel',serif;
            font-size: 10px;
            margin-top: 3px
        }

        .tcs {
            font-size: 9px;
            color: var(--text-dim);
            margin-top: 1px
        }

        .tcc {
            font-size: 10px;
            color: var(--gold);
            margin-top: 2px
        }

        .tcb {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--blue);
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 7px
        }

        .ttr {
            margin-top: 6px;
            width: 100%;
            padding: 5px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(135deg,#1a3a6a,var(--blue));
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer
        }

            .ttr:active {
                transform: scale(.95)
            }

        .tpb {
            height: 3px;
            background: #ffffff11;
            border-radius: 2px;
            margin-top: 5px
        }

        .tpf {
            height: 100%;
            background: var(--blue);
            border-radius: 2px
        }

        /* CLAN */
        .clan-hdr {
            background: linear-gradient(135deg,#1a1535,#2a1050);
            border: 1px solid var(--purple);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            margin-bottom: 10px
        }

        .cnb {
            font-family: 'Cinzel',serif;
            font-size: 18px;
            font-weight: 900;
            color: var(--purple);
            text-shadow: 0 0 18px #9b59b655
        }

        .cm {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 7px;
            margin-bottom: 5px
        }

        .cme {
            font-size: 24px
        }

        .cmn {
            font-family: 'Cinzel',serif;
            font-size: 11px
        }

        .cmr {
            font-size: 9px;
            color: var(--text-dim)
        }

        .cmt {
            font-size: 11px;
            color: var(--gold)
        }

        .cdb {
            padding: 4px 9px;
            border-radius: 6px;
            border: none;
            background: var(--green);
            color: #fff;
            font-family: 'Cinzel',serif;
            font-size: 9px;
            cursor: pointer
        }

        /* BATTLE SCREEN */
        #bscr {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: none;
            flex-direction: column;
            background: #0a0810;
            overflow: hidden
        }

            #bscr.act {
                display: flex
            }

        .btb {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 12px;
            background: #0d0a14;
            border-bottom: 1px solid var(--purple)
        }

        .bfield {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at 50% 100%,#0d2010,#080810 60%);
            overflow: hidden
        }

            .bfield::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image: repeating-linear-gradient(0deg,transparent,transparent 40px,#ffffff03 40px,#ffffff03 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,#ffffff03 40px,#ffffff03 41px);
                pointer-events: none
            }

        .eb {
            position: absolute;
            font-size: 30px;
            cursor: pointer;
            filter: hue-rotate(25deg);
            transform: translate(-50%,-50%)
        }

            .eb.shk {
                animation: shk .3s ease
            }

            .eb.dst {
                opacity: 0;
                transform: translate(-50%,-50%) scale(0) !important;
                transition: all .5s
            }

        @keyframes shk {
            0%,100% {
                transform: translate(-50%,-50%)
            }

            25% {
                transform: translate(calc(-50% - 6px),-50%)
            }

            75% {
                transform: translate(calc(-50% + 6px),-50%)
            }
        }

        .ehp {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 3px;
            background: #ff000022;
            border-radius: 2px
        }

        .ehf {
            height: 100%;
            background: var(--green);
            border-radius: 2px;
            transition: width .3s
        }

        .bbot {
            background: #0d0a14;
            border-top: 1px solid var(--purple);
            padding: 9px 10px;
            display: flex;
            flex-direction: column;
            gap: 7px
        }

        .drow {
            display: flex;
            gap: 7px;
            align-items: center
        }

        .dbtn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 7px 9px;
            cursor: pointer;
            transition: all .15s;
            position: relative
        }

            .dbtn:hover {
                border-color: var(--blue)
            }

            .dbtn.sel {
                border-color: var(--blue);
                background: #1a2840;
                box-shadow: 0 0 10px #4080e855
            }

            .dbtn:active {
                transform: scale(.91)
            }

        .de {
            font-size: 20px
        }

        .dc {
            font-size: 10px;
            color: var(--blue);
            font-family: 'Cinzel',serif
        }

        .dl {
            font-size: 8px;
            color: var(--text-dim)
        }

        .bhpb {
            height: 7px;
            background: #ff000022;
            border-radius: 4px;
            overflow: hidden
        }

        .bhpf {
            height: 100%;
            background: linear-gradient(90deg,var(--red),var(--orange));
            border-radius: 4px;
            transition: width .5s
        }

        .bstars {
            display: flex;
            gap: 4px;
            justify-content: center
        }

        .bst {
            font-size: 18px;
            filter: grayscale(1);
            transition: filter .5s,transform .3s
        }

            .bst.on {
                filter: none;
                transform: scale(1.2)
            }

        .dmgf {
            position: absolute;
            font-family: 'Cinzel',serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--red);
            pointer-events: none;
            z-index: 10;
            animation: du .8s ease-out forwards
        }

        @keyframes du {
            0% {
                opacity: 1;
                transform: translateY(0)
            }

            100% {
                opacity: 0;
                transform: translateY(-38px)
            }
        }

        /* SPEEDUP */
        .spo {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            background: var(--bg-card);
            transition: border-color .15s
        }

            .spo:hover {
                border-color: var(--gem)
            }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 126px;
            left: 50%;
            transform: translateX(-50%) translateY(18px);
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            border-radius: 16px;
            padding: 8px 16px;
            font-family: 'Cinzel',serif;
            font-size: 12px;
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
            z-index: 500;
            white-space: nowrap
        }

            #toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }

        /* PARTICLES */
        @keyframes fup {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1)
            }

            100% {
                opacity: 0;
                transform: translateY(-55px) scale(.5)
            }
        }

        .fp {
            position: fixed;
            pointer-events: none;
            z-index: 600;
            font-size: 14px;
            animation: fup .9s ease-out forwards
        }
    </style>
</head>
<body>
    <div id="topbar">
  <div class="res-group">
    <div class="res-chip" id="gchip"><span>🪙</span><span class="val" id="gval">0</span></div>
    <div class="res-chip" id="fchip"><span>🌾</span><span class="val" id="fval">0</span></div>
  </div>
  <div style="display:flex; gap:6px">
    <div class="res-chip" style="cursor:pointer; padding-right:6px" onclick="openAch()"><span>🏆</span></div>
    <div class="res-chip gem-chip" id="mchip" onclick="openShop()"><span>💎</span><span class="val" id="mval">0</span></div>
  </div>
</div>

    <div id="world"><div id="world-inner"></div></div>

    <div id="bnav">
        <button class="nb active" onclick="setTab('v')"><span class="ni">🏰</span>Village</button>
        <button class="nb" onclick="setTab('t')"><span class="ni">⚔️</span>Troops</button>
        <button class="nb" onclick="setTab('h')"><span class="ni">🌟</span>Heroes</button>
        <button class="nb" onclick="setTab('c')"><span class="ni">🛡️</span>Clan</button>
        <button class="nb" onclick="setTab('b')"><span class="ni">⚡</span>Battle</button>
        <button class="nb" onclick="openShop()"><span class="ni">💎</span>Shop</button>
    </div>

    <div id="toast"></div>

    <!-- BATTLE SCREEN -->
    <div id="bscr">
        <div class="btb">
            <button class="gb drk" style="flex:none;padding:5px 12px;font-size:10px" onclick="endBattle()">↩ Retreat</button>
            <div style="text-align:center">
                <div class="bstars"><span class="bst" id="s1">⭐</span><span class="bst" id="s2">⭐</span><span class="bst" id="s3">⭐</span></div>
                <div style="font-family:'Cinzel',serif;font-size:9px;color:var(--text-dim);margin-top:1px" id="btitle">Enemy Village</div>
            </div>
            <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold)" id="bloot">🪙 0</div>
        </div>
        <div class="bfield" id="bfield" onclick="deployTroop(event)"></div>
        <div class="bbot">
            <div style="display:flex;align-items:center;gap:8px">
                <div style="font-size:10px;color:var(--text-dim);font-family:'Cinzel',serif;white-space:nowrap">Enemy HP</div>
                <div class="bhpb" style="flex:1"><div class="bhpf" id="bhpf"></div></div>
                <div style="font-size:10px;color:var(--text-dim);font-family:'Cinzel',serif" id="bhpt">100%</div>
            </div>
            <div class="drow" id="drow"></div>
            <div style="font-size:9px;color:var(--text-dim);text-align:center;font-family:'Cinzel',serif">Tap the enemy field to deploy selected troop</div>
        </div>
    </div>

    <script>
// ═══════════════ STATE ═══════════════
const G={
  gold:1200,food:480,gems:250,trophies:140,
  lastTick:Date.now(),
  castleLevel:1,
  castleUpgrading:null,
  buildings: [
    { slot: 0, type: 'castle', level: 1, constructionEnd: null, constructionDuration: null },
    ...Array.from({ length: 15 }, (_, i) => ({ slot: i + 1, type: null, constructionEnd: null, constructionDuration: null }))
  ],
  troops:{swordsman:{count:5,training:[]},archer:{count:3,training:[]},knight:{count:0,training:[]},mage:{count:0,training:[]},giant:{count:0,training:[]}},
  heroes:[
    {id:'knight',name:'Iron Knight',  emoji:'🛡️',level:1,xp:0, xpNeeded:100,power:120,unlocked:true, ability:'Shield Bash'},
    {id:'archer',name:'Shadow Archer',emoji:'🏹',level:1,xp:40,xpNeeded:100,power:95, unlocked:true, ability:'Rain of Arrows'},
    {id:'mage',  name:'Storm Mage',   emoji:'🧙',level:0,xp:0, xpNeeded:200,power:180,unlocked:false,ability:'Chain Lightning'},
    {id:'dragon',name:'Dragon Rider', emoji:'🐉',level:0,xp:0, xpNeeded:500,power:400,unlocked:false,ability:"Dragon's Breath"},
  ],
  clan:{name:'Iron Wolves',tag:'#IW2X9K',level:4,members:[
    {name:'You',emoji:'🫵',trophies:140,rank:'Leader'},
    {name:'Thornwood',emoji:'⚔️',trophies:380,rank:'Co-Leader'},
    {name:'Lady Sera',emoji:'👸',trophies:260,rank:'Elder'},
    {name:'GrimAxe',emoji:'🪓',trophies:190,rank:'Member'},
    {name:'SilverFox',emoji:'🦊',trophies:155,rank:'Member'},
    {name:'BoulderFist',emoji:'🪨',trophies:120,rank:'Member'},
  ]},
    selTroop: 'swordsman',
    achieved: [],
    achClaimed: []
};

// ═══════════════ SAVE/LOAD SYSTEM ═══════════════
function saveGame() {
   localStorage.setItem('kingdomForgeSave', JSON.stringify(G));
        }

        function loadGame() {
            const savedData = localStorage.getItem('kingdomForgeSave');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    G = Object.assign(G, parsed);
                    // Fallbacks for older saves
                    G.achieved = G.achieved || [];
                    G.achClaimed = G.achClaimed || [];
                    G.lastTick = Date.now();
                } catch (e) {
                    console.error("Failed to load save", e);
                }
            }
        }


// ═══════════════ CASTLE LEVELS ═══════════════
const CL={
  1:{slots:6, allowed:['goldmine','farm','barracks'],                                    upgCost:500,  upgTime:60,   label:'Wooden Keep'},
  2:{slots:9, allowed:['goldmine','farm','barracks','tower'],                             upgCost:1500, upgTime:180,  label:'Stone Fort'},
  3:{slots:12,allowed:['goldmine','farm','barracks','tower','market','stable'],           upgCost:4000, upgTime:600,  label:'Iron Fortress'},
  4:{slots:16,allowed:['goldmine','farm','barracks','tower','market','stable','forge','wizard'],upgCost:10000,upgTime:1800,label:'Grand Citadel'},
  5:{slots:16,allowed:'all',upgCost:null,upgTime:0,label:'Eternal Bastion'},
};
const cc=l=>CL[Math.min(l,5)];
const isAllowed=t=>t==='castle'||cc(G.castleLevel).allowed==='all'||cc(G.castleLevel).allowed.includes(t);
const maxBLevel=()=>3+G.castleLevel;

// ═══════════════ BUILDING DEFS ═══════════════
const BD={
  castle:  {e:'🏰',n:'Castle',     gc:0,  fc:0,  bt:0,   cr:1,pg:0,pf:0,desc:'Seat of power. Upgrade to unlock buildings and slots.'},
  goldmine:{e:'⛏️',n:'Gold Mine',  gc:200,fc:0,  bt:30,  cr:1,pg:8,pf:0,desc:'Passively produces gold per second.'},
  farm:    {e:'🌾',n:'Farm',        gc:150,fc:0,  bt:20,  cr:1,pg:0,pf:6,desc:'Produces food to train troops.'},
  barracks:{e:'⚔️',n:'Barracks',   gc:300,fc:50, bt:60,  cr:1,pg:0,pf:0,desc:'Train soldiers for battle.'},
  tower:   {e:'🗼',n:'Watch Tower', gc:250,fc:30, bt:45,  cr:2,pg:0,pf:0,desc:'Defends against raiders. Castle Lv2.'},
  market:  {e:'🏪',n:'Market',      gc:400,fc:100,bt:90,  cr:3,pg:4,pf:0,desc:'Bonus gold production. Castle Lv3.'},
  stable:  {e:'🐎',n:'Stables',     gc:350,fc:120,bt:75,  cr:3,pg:0,pf:0,desc:'Train cavalry units. Castle Lv3.'},
  forge:   {e:'🔨',n:'Forge',        gc:600,fc:100,bt:120, cr:4,pg:0,pf:0,desc:'Boosts hero upgrades. Castle Lv4.'},
  wizard:  {e:'🧪',n:'Wizard Tower', gc:800,fc:150,bt:180, cr:4,pg:0,pf:0,desc:'AoE magic defense. Castle Lv4.'},
};

// ═══════════════ TROOP DEFS ═══════════════
const TD={
  swordsman:{e:'⚔️',n:'Swordsman',hp:80, dmg:12,tt:10, gc:25, fc:5, cr:1},
  archer:   {e:'🏹',n:'Archer',   hp:50, dmg:18,tt:15, gc:35, fc:8, cr:1},
  knight:   {e:'🛡️',n:'Knight',  hp:200,dmg:25,tt:45, gc:80, fc:20,cr:2},
  mage:     {e:'🧙',n:'Mage',     hp:60, dmg:45,tt:60, gc:120,fc:30,cr:3},
  giant:    {e:'👹',n:'Giant',    hp:500,dmg:60,tt:120,gc:200,fc:50,cr:4},
};

// ═══════════════ ACHIEVEMENTS ═══════════════
const ACH = [
  { id: 'c2', n: 'Stone Fort', d: 'Upgrade Castle to Lv 2', gems: 100, check: () => G.castleLevel >= 2 },
  { id: 'c3', n: 'Iron Fortress', d: 'Upgrade Castle to Lv 3', gems: 150, check: () => G.castleLevel >= 3 },
  { id: 'b5', n: 'City Planner', d: 'Build 5 structures', gems: 50, check: () => G.buildings.filter(b => b.type && b.type !== 'castle').length >= 4 },
  { id: 't10', n: 'Army Builder', d: 'Train 10 troops total', gems: 50, check: () => Object.values(G.troops).reduce((a, t) => a + t.count, 0) >= 10 },
  { id: 'win1', n: 'First Blood', d: 'Win your first battle', gems: 75, check: () => G.trophies > 140 }
        ];

        function checkAch() {
            ACH.forEach(a => {
                if (!G.achieved.includes(a.id) && a.check()) {
                    G.achieved.push(a.id);
                    showToast(`Achievement Unlocked: ${a.n}! 🏆`);
                }
            });
        }

        function openAch() {
            const list = ACH.map(a => {
                const isClaimed = G.achClaimed.includes(a.id);
                const isUnl = G.achieved.includes(a.id);
                let btn = `<button class="gb drk" style="flex:none;width:85px" disabled>🔒 Locked</button>`;
                if (isClaimed) btn = `<button class="gb" style="flex:none;width:85px;background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border)" disabled>✅ Claimed</button>`;
                else if (isUnl) btn = `<button class="gb gem" style="flex:none;width:85px" onclick="claimAch('${a.id}')">🎁 ${a.gems} 💎</button>`;

                return `<div class="si" style="cursor:default; margin-bottom:5px">
      <span class="sii">🏆</span>
      <div><div class="sin">${a.n}</div><div class="sid">${a.d}</div></div>
      ${btn}
    </div>`;
            }).join('');
            showModal(`<div class="mt">🏆 Achievements</div><div class="msub">Earn gems for your progress</div><div class="msc">${list}</div><div class="br" style="margin-top:8px"><button class="gb drk" onclick="closeModal()">Close</button></div>`);
        }

        function claimAch(id) {
            const a = ACH.find(x => x.id === id);
            if (!a || G.achClaimed.includes(id)) return;
            G.achClaimed.push(id);
            G.gems += a.gems;
            showToast(`+${a.gems} Gems! 💎`);
            bump('mchip'); spawnP('💎', 4); updateUI(); openAch(); saveGame();
        }


// ═══════════════ TICK ═══════════════
function tick(){
  const now=Date.now(), dt=(now-G.lastTick)/1000;
  G.lastTick=now;
  G.buildings.forEach(b=>{
    if(!b.type||b.constructionEnd)return;
    const d=BD[b.type];if(!d)return;
    G.gold+=d.pg*b.level*dt; G.food+=d.pf*b.level*dt;
  });
  G.gold=Math.min(G.gold,99999); G.food=Math.min(G.food,9999);
  // castle upgrade done?
  if(G.castleUpgrading&&now>=G.castleUpgrading){
    G.castleUpgrading=null; G.castleLevel++;
    const cb=G.buildings.find(b=>b.type==='castle');
    if(cb){cb.level=G.castleLevel;cb.constructionEnd=null;}
    showToast(`Castle upgraded to Level ${G.castleLevel}! 🏰✨`);spawnP('🏰',5);
  }
  // troop training
  Object.entries(G.troops).forEach(([id,t])=>{
    const done=t.training.filter(tr=>now>=tr.finishAt);
    if(done.length){t.count+=done.length;t.training=t.training.filter(tr=>now<tr.finishAt);showToast(`${TD[id].e} ${TD[id].n} ×${done.length} ready!`);}
  });
  checkAch();
  updateUI();renderBuildings();
  setTimeout(tick,1000);
}

// ═══════════════ UI ═══════════════
function updateUI(){
  document.getElementById('gval').textContent=fmt(G.gold);
  document.getElementById('fval').textContent=fmt(G.food);
  document.getElementById('mval').textContent=fmt(G.gems);
  document.getElementById('cbadge').textContent=`🏰 Lv${G.castleLevel} · ${cc(G.castleLevel).label}`;
}
function fmt(n) {
  if (n < 1000) return Math.floor(n).toString();
  if (n < 1000000) return (n / 1000).toFixed(1).replace('.0', '') + 'k';
  if (n < 1000000000) return (n / 1000000).toFixed(2).replace('.00', '') + 'M';
  return (n / 1000000000).toFixed(2).replace('.00', '') + 'B'; // For the billionaires!
}
function bump(id){const e=document.getElementById(id);e.classList.add('bump');setTimeout(()=>e.classList.remove('bump'),280);}

// ═══════════════ WORLD ═══════════════
function renderBuildings(){
  const wi=document.getElementById('world-inner');
  const unlocked=cc(G.castleLevel).slots;
  const cols=G.castleLevel>=3?4:3;
  wi.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  wi.style.gridTemplateRows=`repeat(${Math.ceil(16/cols)},1fr)`;
  wi.innerHTML='';
  G.buildings.forEach((b,i)=>{
    const s=document.createElement('div'); s.className='bs';
    if(i>=unlocked){
      s.classList.add('lk');
      s.innerHTML=`<span style="font-size:14px">🔒</span><div class="bn" style="font-size:7px">Lv${i<9?2:i<12?3:4}+</div>`;
    } else if(!b.type){
      s.classList.add('empty');
      s.innerHTML=`<span class="pi">＋</span>`;
      s.onclick=()=>openBuildMenu(i);
    } else {
      const d=BD[b.type], isCas=b.type==='castle';
      if(isCas) s.classList.add('cas'); else s.classList.add('has');
      // is it being built/upgraded?
      const conEnd=isCas?G.castleUpgrading:b.constructionEnd;
      const conDur=isCas?(b.constructionDuration||60000):b.constructionDuration;
      if(conEnd){
        s.classList.add('con');
        const rem=Math.max(0,conEnd-Date.now());
        const pct=conDur?Math.round((1-rem/conDur)*100):0;
        s.innerHTML=`<span class="be">${d.e}</span><div class="bn">${d.n}</div><div class="tl">${fmtT(rem)}</div><div class="pb"><div class="pf" style="width:${pct}%"></div></div>`;
        s.onclick=()=>isCas?openCastleSpeedup():openSpeedup(i);
        if(rem<=0&&!isCas){b.constructionEnd=null;b.level=(b.level||0)+1;showToast(`${d.n} complete! 🎉`);}
      } else {
        const sz=isCas?'32px':b.level>=3?'28px':'24px';
        s.innerHTML=`<span class="be" style="font-size:${sz}">${d.e}</span><div class="bn">${d.n}</div><div class="bl">Lv${b.level}</div>`;
        s.onclick=()=>isCas?openCastle():openBInfo(i);
      }
    }
    wi.appendChild(s);
  });
  // deco trees
  [{x:3,y:28},{x:89,y:18},{x:76,y:70},{x:5,y:66}].forEach(t=>{
    const el=document.createElement('div');el.className='deco-tree';
    el.style.cssText=`left:${t.x}%;top:${t.y}%`;el.textContent='🌲';wi.appendChild(el);
  });
}

// ═══════════════ MODALS ═══════════════
let AM=null;
function closeModal(){if(AM){AM.remove();AM=null;}}
function showModal(html,center=false){
  closeModal();
  const ov=document.createElement('div');
  ov.className='mo'+(center?' ctr':'');
  ov.innerHTML=`<div class="ms${center?' cs':''}"><div class="mh"></div>${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);AM=ov;
}

// ═══════════════ CASTLE ═══════════════
function openCastle(){
  const lvl=G.castleLevel, cfg=cc(lvl), nxt=cc(lvl+1), maxed=lvl>=5;
  const canUpg=!maxed&&G.gold>=cfg.upgCost&&!G.castleUpgrading;
  const nextInfo=maxed?'All content unlocked!':`+${nxt.slots-cfg.slots} slots · New buildings`;
  showModal(`
    <span style="font-size:50px;display:block;text-align:center;margin:4px 0">🏰</span>
    <div class="mt">Castle — Level ${lvl}</div>
    <div class="msub">${cfg.label}</div>
    <div style="margin:8px 0">
      <div class="sr"><span class="sl">Building Slots</span><span class="sv">${cfg.slots} / 16</span></div>
      <div class="sr"><span class="sl">Max Building Level</span><span class="sv">${maxBLevel()}</span></div>
      ${!maxed?`
      <div class="sr"><span class="sl">Upgrade Cost</span><span class="sv">🪙 ${cfg.upgCost.toLocaleString()}</span></div>
      <div class="sr"><span class="sl">Upgrade Time</span><span class="sv">⏱ ${fmtT(cfg.upgTime*1000)}</span></div>
      <div class="sr"><span class="sl">Lv${lvl+1} Unlocks</span><span class="sv" style="color:var(--gem);font-size:11px">${nextInfo}</span></div>
      `:`<div class="sr"><span class="sl">Status</span><span class="sv" style="color:var(--gold)">MAX LEVEL ⭐</span></div>`}
    </div>
    <div style="font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:7px">Castle upgrades lock it during construction. Plan ahead!</div>
    <div class="br">
      <button class="gb drk" onclick="closeModal()">Close</button>
      ${!maxed?`<button class="gb gld" onclick="${canUpg?'upgCastle()':''}" style="${canUpg?'':'opacity:.45;cursor:not-allowed'}" ${canUpg?'':''}>⬆ Upgrade Castle</button>`:''}
    </div>
  `);
  if(!maxed&&!canUpg){
    // attach click handler for feedback
    const btn=AM.querySelector('.gb.gld');
    if(btn)btn.onclick=()=>showToast(`Need 🪙${cfg.upgCost.toLocaleString()} & no active upgrade!`);
  }
}
function upgCastle(){
  const cfg=cc(G.castleLevel);
  G.gold-=cfg.upgCost;
  const dur=cfg.upgTime*1000;
  G.castleUpgrading=Date.now()+dur;
  const cb=G.buildings.find(b=>b.type==='castle');
  if(cb){cb.constructionEnd=G.castleUpgrading;cb.constructionDuration=dur;}
  closeModal();showToast(`Castle upgrading to Lv${G.castleLevel+1}! ⚒️`);updateUI();renderBuildings();
}
function openCastleSpeedup(){
  if(!G.castleUpgrading)return;
  const rem=Math.max(0,G.castleUpgrading-Date.now());
  const gc=Math.ceil(rem/60000);
  showModal(`
    <div class="mt">⚡ Speed Up Castle</div>
    <div class="msub">🏰 Upgrading to Lv${G.castleLevel+1} — ${fmtT(rem)} remaining</div>
    <div class="spo" onclick="cspeed(3600000,50)"><span style="font-size:20px">⚡</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:12px">1-Hour Boost</div><div style="font-size:11px;color:var(--gem)">50 💎</div></div></div>
    <div class="spo" onclick="cspeed(28800000,200)"><span style="font-size:20px">⚡⚡</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:12px">8-Hour Boost</div><div style="font-size:11px;color:var(--gem)">200 💎</div></div></div>
    <div class="spo" onclick="cfin(${gc})"><span style="font-size:20px">✨</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:12px">Finish Now!</div><div style="font-size:11px;color:var(--gem)">${gc} 💎</div></div></div>
    <div class="br" style="margin-top:7px"><button class="gb drk" onclick="closeModal()">Not Now</button></div>
  `);
}
function cspeed(ms,cost){
  if(G.gems<cost){showToast('Not enough gems!');return;}
  G.gems-=cost;G.castleUpgrading-=ms;
  const cb=G.buildings.find(b=>b.type==='castle');if(cb)cb.constructionEnd=G.castleUpgrading;
  closeModal();showToast('Speed boost applied! ⚡');bump('mchip');spawnP('⚡',3);updateUI();renderBuildings();
}
function cfin(cost){
  if(G.gems<cost){showToast('Not enough gems!');return;}
  G.gems-=cost;G.castleUpgrading=Date.now()-1;
  closeModal();showToast('Castle complete! 🎉');spawnP('🏰',5);updateUI();renderBuildings();
}

// ═══════════════ BUILD MENU ═══════════════
function openBuildMenu(idx){
  const rows=Object.entries(BD).filter(([k])=>k!=='castle').map(([key,d])=>{
    const ok=isAllowed(key), afford=G.gold>=d.gc&&G.food>=d.fc;
    const cls=!ok?'nc':!afford?'ca':'';
    const click=ok&&afford?`startBuild(${idx},'${key}')`:ok?`showToast('Need more resources!')`: `showToast('Upgrade Castle to Lv${d.cr}!')`;
    return`<div class="bop ${cls}" onclick="${click}"><div class="boi">${d.e}</div><div class="bon">${d.n}</div><div class="boc">🪙${d.gc}${d.fc?` 🌾${d.fc}`:''}</div><div class="bot">⏱${fmtT(d.bt*1000)}</div>${!ok?`<div class="boreq">Castle Lv${d.cr}</div>`:''}</div>`;
  }).join('');
  showModal(`<div class="mt">🏗️ Build</div><div class="msub">Castle Lv${G.castleLevel} — gray = locked</div><div class="msc"><div class="bgrid">${rows}</div></div><div class="br" style="margin-top:8px"><button class="gb drk" onclick="closeModal()">Cancel</button></div>`);
}
function startBuild(idx,type){
  const d=BD[type]; G.gold-=d.gc; G.food-=d.fc;
  const dur=d.bt*1000;
  const b=G.buildings[idx]; b.type=type;b.level=0;b.constructionEnd=Date.now()+dur;b.constructionDuration=dur;
  closeModal();showToast(`Building ${d.n}… ⚒️`);spawnP('🪙',2);updateUI();renderBuildings();
}

// ═══════════════ BUILDING INFO ═══════════════
function openBInfo(idx){
  const b=G.buildings[idx], d=BD[b.type];
  const uc=Math.floor(d.gc*1.6*b.level), ut=Math.floor(d.bt*b.level*1.5);
  const ml=maxBLevel(), atMax=b.level>=ml;
  const canU=!atMax&&G.gold>=uc;
  const prod=d.pg>0?`+${d.pg*b.level}/s 🪙`:d.pf>0?`+${d.pf*b.level}/s 🌾`:'Passive';
  showModal(`
    <span style="font-size:48px;display:block;text-align:center;margin:4px 0">${d.e}</span>

    </div>
    <div class="br">
      <button class="gb drk" onclick="closeModal()">Close</button>

}
function upgB(idx){
  const b=G.buildings[idx], d=BD[b.type];
  const cost=Math.floor(d.gc*1.6*b.level), dur=Math.floor(d.bt*b.level*1.5)*1000;
  G.gold-=cost; b.constructionEnd=Date.now()+dur; b.constructionDuration=dur;
  closeModal();showToast(`Upgrading ${d.n} to Lv${b.level+1}…`);updateUI();renderBuildings();
}

function openSpeedup(idx){

    <div class="spo" onclick="finNow(${idx},${gc})"><span style="font-size:20px">✨</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:12px">Finish Now!</div><div style="font-size:11px;color:var(--gem)">${gc} 💎</div></div></div>

function useSpeedup(idx,ms,cost){

  G.gems-=cost; G.buildings[idx].constructionEnd-=ms;
  closeModal();showToast('Speed boost applied! ⚡');bump('mchip');spawnP('⚡',3);updateUI();renderBuildings();
}
function finNow(idx,cost){
  if(G.gems<cost){showToast('Not enough gems!');return;}
  G.gems-=cost;
  const b=G.buildings[idx];b.constructionEnd=null;b.level=(b.level||0)+1;
  closeModal();showToast('Construction complete! 🎉');spawnP('✨',4);bump('mchip');updateUI();renderBuildings();
}

// ═══════════════ TROOPS ═══════════════
function openTroops() {
  const brx = G.buildings.find(b => b.type === 'barracks' && !b.constructionEnd);
  let h = `<div class="mt">⚔️ Troop Training</div>`;
  if (!brx) { h += `<div class="msub" style="color:var(--orange)">Build a Barracks first!</div>`; }
  else {
    const brxLvl = brx.level;
    const speedMult = Math.pow(0.85, brxLvl - 1); // 15% faster per Barracks level
    
    h += `<div class="msub">Barracks Lv${brxLvl} — Training Speed: ${Math.round((1 - speedMult)*100)}% Boost</div><div class="msc"><div class="tgrid">`;
    Object.entries(TD).forEach(([id, d]) => {
      const realTt = d.tt * speedMult; // Apply speed boost to UI
      const t=G.troops[id], unlk=G.castleLevel>=d.cr;
      const afford=G.gold>=d.gc&&G.food>=d.fc;
      const now=Date.now();
      const next=t.training.length>0?fmtT(Math.max(0,t.training[0].finishAt-now)):'';
      const pct=t.training.length>0?Math.round((1-(t.training[0].finishAt-now)/(d.tt*1000))*100):0;
      h+=`<div class="tc">
        ${t.count>0?`<span class="tcb">${t.count}</span>`:''}
        <span class="tce">${d.e}</span>
        <div class="tcn">${d.n}</div>
        <div class="tcs">❤️${d.hp} ⚔️${d.dmg}</div>
        <div class="tcc">🪙${d.gc} 🌾${d.fc}</div>
        ${!unlk?`<div style="font-size:9px;color:var(--red);margin-top:3px">Castle Lv${d.cr}</div>`:
          `<button class="ttr" onclick="trainTroop('${id}')" ${afford?'':''} style="${afford?'':'opacity:.5;cursor:not-allowed'}">${afford?`+Train (${fmtT(realTt * 1000)})`:'Need Resources'}</button>`}
        ${t.training.length>0?`<div class="tpb"><div class="tpf" style="width:${pct}%"></div></div><div style="font-size:8px;color:var(--blue);margin-top:2px">${t.training.length} training · ${next}</div>`:''}
      </div>`;
    });
    h+=`</div>`;
    // army summary
    const total=Object.values(G.troops).reduce((a,t)=>a+t.count,0);
    h+=`<div style="margin-top:12px;font-family:'Cinzel',serif;font-size:12px;color:var(--text-dim);margin-bottom:6px">Your Army (${total} troops)</div>`;
    Object.entries(TD).forEach(([id,d])=>{
      const t=G.troops[id];
      if(t.count>0) h+=`<div style="display:flex;align-items:center;gap:8px;padding:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:7px;margin-bottom:5px"><span style="font-size:24px">${d.e}</span><div style="flex:1"><div style="font-family:'Cinzel',serif;font-size:11px">${d.n} ×${t.count}</div><div style="font-size:10px;color:var(--blue)">⚔ Dmg:${d.dmg} ❤ HP:${d.hp}</div></div></div>`;
    });
    if(total===0) h+=`<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:8px">No troops yet.</div>`;
    h+=`</div>`;
  }
  h+=`<div class="br" style="margin-top:10px"><button class="gb drk" onclick="closeModal()">Close</button><button class="gb gld" onclick="closeModal();setTab('b')">⚡ Battle!</button></div>`;
  showModal(h);
}
function trainTroop(id) {
  const d = TD[id];
  if (G.gold < d.gc || G.food < d.fc) { showToast('Not enough resources!'); return; }
  
  const brx = G.buildings.find(b => b.type === 'barracks');
  const speedMult = brx ? Math.pow(0.85, brx.level - 1) : 1;
  const realTt = d.tt * speedMult;

  G.gold -= d.gc; G.food -= d.fc;
  G.troops[id].training.push({ finishAt: Date.now() + realTt * 1000 });
  showToast(`Training ${d.e} ${d.n}…`); updateUI(); closeModal(); openTroops();
}

// ═══════════════ BATTLE ═══════════════
const ELAYOUTS=[
  [{e:'🏚️',x:28,y:22,hp:60,mhp:60},{e:'⛏️',x:58,y:32,hp:40,mhp:40},{e:'🌾',x:72,y:58,hp:30,mhp:30},{e:'🏰',x:42,y:52,hp:80,mhp:80}],
  [{e:'🏰',x:42,y:25,hp:120,mhp:120},{e:'⚔️',x:22,y:52,hp:80,mhp:80},{e:'🗼',x:68,y:42,hp:60,mhp:60},{e:'⛏️',x:78,y:68,hp:50,mhp:50},{e:'🌾',x:26,y:72,hp:40,mhp:40}],
  [{e:'🏰',x:42,y:22,hp:200,mhp:200},{e:'🗼',x:16,y:42,hp:120,mhp:120},{e:'🗼',x:72,y:42,hp:120,mhp:120},{e:'⚔️',x:30,y:62,hp:90,mhp:90},{e:'⚔️',x:58,y:68,hp:90,mhp:90},{e:'🔮',x:46,y:78,hp:60,mhp:60}],
];
let BS=null;

function openBSearch(){
  const total=Object.values(G.troops).reduce((a,t)=>a+t.count,0);
  if(total===0){
    showModal(`<div class="mt">⚡ Battle</div><div class="msub" style="color:var(--orange)">No troops! Train some first.</div><div class="br"><button class="gb drk" onclick="closeModal()">Close</button><button class="gb gld" onclick="closeModal();setTab('t')">⚔ Train</button></div>`);
    return;
  }
  const enemies=[
    {n:'Stonewall Keep',   loot:180,diff:'Easy',  dc:'var(--green)'},
    {n:'Ironveil Bastion', loot:320,diff:'Medium',dc:'var(--gold)'},
    {n:'Dreadforge Keep',  loot:580,diff:'Hard',  dc:'var(--red)'},
  ];
  const heroes=G.heroes.filter(h=>h.unlocked);
  const power=heroes.reduce((a,h)=>a+h.power+h.level*20,0)+total*15;
  const opts=enemies.map((e,i)=>`
    <div class="si" onclick="startBattle(${i})">
      <span class="sii">⚔️</span>
      <div><div class="sin">${e.n}</div><div class="sid">Difficulty: <span style="color:${e.dc}">${e.diff}</span></div></div>
      <span style="font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold)">🪙${e.loot}</span>
    </div>`).join('');
  showModal(`<div class="mt">⚡ Find Battle</div><div class="msub">Your power: ⚔️ ${power} · ${total} troops</div>${opts}<div class="br"><button class="gb drk" onclick="closeModal()">Cancel</button></div>`);
}

function startBattle(ei){
  closeModal();
  const enemies=[{n:'Stonewall Keep',loot:180},{n:'Ironveil Bastion',loot:320},{n:'Dreadforge Keep',loot:580}];
  const layout=ELAYOUTS[ei].map(b=>({...b}));
  BS={
    enemy:enemies[ei],
    buildings:layout,
    totalHp:layout.reduce((a,b)=>a+b.mhp,0),
    currentHp:layout.reduce((a,b)=>a+b.hp,0),
    loot:0, stars:0,
    troops:{},
  };
  Object.entries(G.troops).forEach(([id,t])=>{if(t.count>0)BS.troops[id]=t.count;});
  document.getElementById('btitle').textContent=enemies[ei].n;
  renderBattle();
  document.getElementById('bscr').classList.add('act');
}

function renderBattle(){
  if(!BS)return;
  const field=document.getElementById('bfield');
  field.innerHTML='';
  BS.buildings.forEach((b,i)=>{
    if(b.hp<=0)return;
    const el=document.createElement('div'); el.className='eb'; el.id=`eb${i}`;
    el.style.left=b.x+'%'; el.style.top=b.y+'%';
    el.innerHTML=`${b.e}<div class="ehp"><div class="ehf" style="width:${Math.round(b.hp/b.mhp*100)}%"></div></div>`;
    field.appendChild(el);
  });
  // deploy buttons
  const row=document.getElementById('drow'); row.innerHTML='';
  Object.entries(TD).forEach(([id,d])=>{
    const cnt=BS.troops[id]||0;
    if(!G.troops[id]||G.troops[id].count===0&&cnt===0)return;
    const btn=document.createElement('div');
    btn.className='dbtn'+(G.selTroop===id?' sel':''); btn.id=`db${id}`;
    btn.innerHTML=`<span class="de">${d.e}</span><span class="dc">×${cnt}</span><span class="dl">${d.n}</span>`;
    btn.onclick=e=>{e.stopPropagation();G.selTroop=id;updDeploy();};
    row.appendChild(btn);
  });
  updateBHUD();
}

function updDeploy(){
  Object.keys(TD).forEach(id=>{
    const btn=document.getElementById(`db${id}`);
    if(!btn)return;
    btn.className='dbtn'+(G.selTroop===id?' sel':'');
    btn.querySelector('.dc').textContent=`×${BS.troops[id]||0}`;
  });
}

function deployTroop(ev){
  if(!BS)return;
  const id=G.selTroop; const cnt=BS.troops[id]||0;
  if(cnt<=0){showToast('No '+TD[id].n+' left!');return;}
  BS.troops[id]--; G.troops[id].count=Math.max(0,G.troops[id].count-1);

  const field=document.getElementById('bfield'); const rect=field.getBoundingClientRect();
  const px=(ev.clientX-rect.left)/rect.width*100;
  const py=(ev.clientY-rect.top)/rect.height*100;

  // find nearest alive building
  let best=-1, bestD=Infinity;
  BS.buildings.forEach((b,i)=>{if(b.hp<=0)return;const d=(b.x-px)**2+(b.y-py)**2;if(d<bestD){bestD=d;best=i;}});
  if(best===-1){checkWin();return;}

  const d=TD[id], tgt=BS.buildings[best];
  const dmg=d.dmg+Math.floor(Math.random()*10);
  tgt.hp=Math.max(0,tgt.hp-dmg);

  // damage float
  const fx=rect.left+tgt.x/100*rect.width, fy=rect.top+tgt.y/100*rect.height;
  const fl=document.createElement('div'); fl.className='dmgf'; fl.textContent=`-${dmg}`;
  fl.style.left=fx+'px'; fl.style.top=fy+'px';
  document.body.appendChild(fl); setTimeout(()=>fl.remove(),900);

  // update building el
  const bEl=document.getElementById(`eb${best}`);
  if(bEl){
    if(tgt.hp<=0){
      bEl.classList.add('dst'); setTimeout(()=>bEl.remove(),500);
      spawnP('💥',3); BS.loot+=Math.floor(BS.enemy.loot/BS.buildings.length);
    } else {
      bEl.classList.add('shk'); setTimeout(()=>bEl.classList.remove('shk'),350);
      bEl.querySelector('.ehf').style.width=Math.round(tgt.hp/tgt.mhp*100)+'%';
    }
  }

  BS.currentHp=BS.buildings.reduce((a,b)=>a+Math.max(0,b.hp),0);
  updateBHUD(); updDeploy(); checkWin();
}

function checkWin(){
  const pct=1-BS.currentHp/BS.totalHp;
  if(pct>=0.33)awardStar(1); if(pct>=0.66)awardStar(2); if(pct>=1){awardStar(3);setTimeout(()=>endBattle(true),600);}
}

function awardStar(n){
  const el=document.getElementById(`s${n}`);
  if(el&&!el.classList.contains('on')){el.classList.add('on');BS.stars=Math.max(BS.stars,n);spawnP('⭐',2);}
}

function updateBHUD(){
  const pct=Math.round(BS.currentHp/BS.totalHp*100);
  document.getElementById('bhpf').style.width=pct+'%';
  document.getElementById('bhpt').textContent=pct+'%';
  document.getElementById('bloot').textContent=`🪙${BS.loot}`;
}

function endBattle(won=false){
  if(BS&&won){
    G.gold+=BS.loot; G.trophies+=BS.stars*5;
    G.heroes.filter(h=>h.unlocked).forEach(h=>{h.xp=Math.min(h.xpNeeded,h.xp+20);});
    showToast(`Victory! +${BS.loot} 🪙 +${BS.stars*5} 🏆`);spawnP('🪙',5);bump('gchip');
  } else if(BS){showToast('Retreated.');}
  BS=null;
  document.getElementById('bscr').classList.remove('act');
  updateUI();
}

// ═══════════════ SHOP ═══════════════
const SHOP=[
  {id:'g80',  i:'💎',n:'80 Gems',      d:'Starter pack',       p:'$0.99', gems:80},
  {id:'g500', i:'💎',n:'500 Gems',     d:'Popular · Best deal',p:'$4.99', gems:500,tag:'POPULAR'},
  {id:'g1200',i:'💎',n:'1,200 Gems',   d:'Chest of gems',      p:'$9.99', gems:1200},
  {id:'g2600',i:'💎',n:'2,600 Gems',   d:'+200 bonus',         p:'$19.99',gems:2600,tag:'VALUE'},
  {id:'gp',   i:'🪙',n:'Gold Pack',    d:'10,000 gold now',    p:'100 💎',cost:100,type:'gold',amt:10000},
  {id:'s1h',  i:'⚡',n:'1-Hr Speedup', d:'Any building',       p:'50 💎', cost:50, type:'spd',ms:3600000},
  {id:'s8h',  i:'⚡',n:'8-Hr Speedup', d:'Any building',       p:'200 💎',cost:200,type:'spd',ms:28800000},
];
function openShop(){
  const items=SHOP.map(it=>`<div class="si" onclick="buyItem('${it.id}')"><span class="sii">${it.i}</span><div><div class="sin">${it.n}${it.tag?` <span style="color:var(--gem);font-size:9px">[${it.tag}]</span>`:''}</div><div class="sid">${it.d}</div></div><span class="sip">${it.p}</span></div>`).join('');
  showModal(`<div class="mt">💎 Gem Shop</div><div class="msub">Power up your kingdom</div><div class="msc">${items}</div><div class="br" style="margin-top:8px"><button class="gb drk" onclick="closeModal()">Close</button></div>`);
}
function buyItem(id){
  const it=SHOP.find(s=>s.id===id);if(!it)return;
  if(it.type==='gold'){
    if(G.gems<it.cost){showToast('Not enough gems!');return;}
    G.gems-=it.cost;G.gold+=it.amt;
    showToast(`+${it.amt.toLocaleString()} Gold! 🪙`);bump('gchip');bump('mchip');spawnP('🪙',4);updateUI();closeModal();return;
  }
  if(it.type==='spd'){
    const con=G.buildings.find(b=>b.constructionEnd&&b.type!=='castle');
    if(!con&&!G.castleUpgrading){showToast('Nothing building!');return;}
    if(G.gems<it.cost){showToast('Not enough gems!');return;}
    G.gems-=it.cost;
    if(con)con.constructionEnd-=it.ms;
    if(G.castleUpgrading)G.castleUpgrading-=it.ms;
    showToast('Speed boost! ⚡');bump('mchip');spawnP('⚡',3);updateUI();closeModal();return;
  }
  G.gems+=it.gems;showToast(`+${it.gems} Gems! 💎`);bump('mchip');spawnP('💎',4);updateUI();closeModal();
}

// ═══════════════ TABS ═══════════════
function setTab(tab){
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('active',['v','t','h','c','b','shop'][i]===tab));
  closeModal();
  if(tab==='t')openTroops();
  else if(tab==='h')openHeroes();
  else if(tab==='c')openClan();
  else if(tab==='b')openBSearch();
  else if(tab==='shop')openShop();
}

// ═══════════════ HELPERS ═══════════════
let TT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(TT);TT=setTimeout(()=>t.classList.remove('show'),2600);
}
function spawnP(em,n){
  const cx=innerWidth/2,cy=innerHeight/2;
  for(let i=0;i<n;i++) setTimeout(()=>{
    const p=document.createElement('div');p.className='fp';p.textContent=em;
    p.style.left=(cx+(Math.random()-.5)*110)+'px';p.style.top=(cy+(Math.random()-.5)*70)+'px';
    document.body.appendChild(p);setTimeout(()=>p.remove(),950);
  },i*75);
}

// ═══════════════ INIT ═══════════════
loadGame();
updateUI();renderBuildings();
setTimeout(tick,1000);
showToast('Welcome to Kingdom Forge! Tap 🏰 to see your Castle.');
